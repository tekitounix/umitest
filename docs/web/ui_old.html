<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Audio UI Demo</title>
  <style>
    /* ============================================
       Design Tokens (調整済み値)

       Based on common design system scales:
       - Space: 4px base, doubling scale
       - Font: system-ui, mobile-optimized sizes
       - Radius: subtle to prominent
       ============================================ */
    :root {
      /* === Grid System === */
      --unit: 22px;           /* Base grid unit for audio controls */
      --cols: 16;             /* Default column count */
      --container-padding: var(--space-sm);  /* 8px */
      --container-width: calc(var(--cols) * var(--unit) + var(--container-padding) * 2);
      /* Expand: 2パネル + gap */
      --panel-gap: var(--space-md);  /* 12px */
      --container-width-expand: calc(var(--container-width) * 2 + var(--panel-gap));

      /* === Space (4px base scale) === */
      --space-xs: 0.25rem;   /* 4px */
      --space-sm: 0.5rem;    /* 8px */
      --space-md: 0.75rem;   /* 12px */
      --space-lg: 1rem;      /* 16px */
      --space-xl: 1.5rem;    /* 24px */

      /* === Radius Scale (theme uses these) === */
      --radius-0: 0;
      --radius-1: 2px;
      --radius-2: 4px;
      --radius-3: 6px;
      --radius-4: 8px;
      --radius-5: 12px;
      --radius-full: 9999px;

      /* UI appearance tokens are set by theme:
         --ui-radius, --ui-radius-pill, --ui-radius-round, --border-width */

      /* === Typography === */
      --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Hiragino Sans", "Noto Sans JP", sans-serif;
      --font-size-xs: 0.6875rem;  /* 11px */
      --font-size-sm: 0.75rem;    /* 12px */
      --font-size-md: 0.875rem;   /* 14px */
      --font-size-lg: 1rem;       /* 16px */

      /* === Z-index === */
      --z-topbar: 10;

      /* === Shadow === */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 4px 8px rgba(0, 0, 0, 0.25);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 8px var(--color-accent);

      /* === Motion (durations) === */
      --motion-fast: 0.1s;
      --motion-normal: 0.15s;
      --motion-slow: 0.25s;
      --motion-easing: ease-out;
    }

    /* ============================================
       Theme: Midnight (default) - Sharp dark with blue tint
       ============================================ */
    :root, .theme-midnight {
      color-scheme: dark;
      /* Color */
      --color-bg: #0b0d10;
      --color-panel: #12161c;
      --color-panel2: #0f1318;
      --color-fg: #e9eef6;
      --color-muted: #8b98a8;
      --color-line: #2a3544;
      --color-accent: #5ec4e8;
      --color-good: #4ade80;
      --color-warn: #e8c45e;
      --color-bad: #e85e6c;
      --color-canvas: #06080b;
      /* Look */
      --ui-radius: var(--radius-0);
      --ui-radius-inner: var(--radius-0);
      --ui-radius-pill: var(--radius-4);
      --ui-radius-round: var(--radius-full);
      --border-width: 1px;
    }

    /* ============================================
       Theme: Charcoal - Warm gray, rounded
       ============================================ */
    .theme-charcoal {
      color-scheme: dark;
      /* Color */
      --color-bg: #1a1a1a;
      --color-panel: #242424;
      --color-panel2: #1e1e1e;
      --color-fg: #f5f5f5;
      --color-muted: #a0a0a0;
      --color-line: #3a3a3a;
      --color-accent: #ff9f43;
      --color-good: #22c55e;
      --color-warn: #feca57;
      --color-bad: #ee5a52;
      --color-canvas: #0f0f0f;
      /* Look */
      --ui-radius: var(--radius-3);
      --ui-radius-inner: var(--radius-1);
      --ui-radius-pill: var(--radius-4);
      --ui-radius-round: var(--radius-full);
      --border-width: 1px;
    }

    /* ============================================
       Theme: Forest - Green tint, soft
       ============================================ */
    .theme-forest {
      color-scheme: dark;
      /* Color */
      --color-bg: #0d1210;
      --color-panel: #141f1a;
      --color-panel2: #101915;
      --color-fg: #e8f0eb;
      --color-muted: #8aa896;
      --color-line: #2a4035;
      --color-accent: #4ade80;
      --color-good: #22c55e;
      --color-warn: #fbbf24;
      --color-bad: #f87171;
      --color-canvas: #060a08;
      /* Look */
      --ui-radius: var(--radius-2);
      --ui-radius-inner: var(--radius-1);
      --ui-radius-pill: var(--radius-4);
      --ui-radius-round: var(--radius-full);
      --border-width: 1px;
    }

    /* ============================================
       Theme: Slate - Cool gray/blue, modern
       ============================================ */
    .theme-slate {
      color-scheme: dark;
      /* Color */
      --color-bg: #0f172a;
      --color-panel: #1e293b;
      --color-panel2: #172033;
      --color-fg: #f1f5f9;
      --color-muted: #94a3b8;
      --color-line: #334155;
      --color-accent: #818cf8;
      --color-good: #34d399;
      --color-warn: #fbbf24;
      --color-bad: #f87171;
      --color-canvas: #080c1a;
      /* Look */
      --ui-radius: var(--radius-4);
      --ui-radius-inner: var(--radius-2);
      --ui-radius-pill: var(--radius-5);
      --ui-radius-round: var(--radius-full);
      --border-width: 1px;
    }

    /* ============================================
       Theme: Light - Clean light mode
       ============================================ */
    .theme-light {
      color-scheme: light;
      /* Color */
      --color-bg: #f8fafc;
      --color-panel: #ffffff;
      --color-panel2: #f1f5f9;
      --color-fg: #1e293b;
      --color-muted: #64748b;
      --color-line: #e2e8f0;
      --color-accent: #0ea5e9;
      --color-good: #22c55e;
      --color-warn: #f59e0b;
      --color-bad: #ef4444;
      --color-canvas: #e8ecf0;
      /* Look */
      --ui-radius: var(--radius-3);
      --ui-radius-inner: var(--radius-1);
      --ui-radius-pill: var(--radius-4);
      --ui-radius-round: var(--radius-full);
      --border-width: 1px;
    }

    /* ============================================
       Theme: Sepia - Warm light
       ============================================ */
    .theme-sepia {
      color-scheme: light;
      /* Color */
      --color-bg: #faf8f5;
      --color-panel: #fffefa;
      --color-panel2: #f5f2ed;
      --color-fg: #3d3529;
      --color-muted: #78716c;
      --color-line: #e7e0d5;
      --color-accent: #d97706;
      --color-good: #16a34a;
      --color-warn: #ca8a04;
      --color-bad: #dc2626;
      --color-canvas: #ebe5db;
      /* Look */
      --ui-radius: var(--radius-4);
      --ui-radius-inner: var(--radius-2);
      --ui-radius-pill: var(--radius-5);
      --ui-radius-round: var(--radius-full);
      --border-width: 1px;
    }

    /* ============================================
       Reset / Base
       ============================================ */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--color-bg);
      color: var(--color-fg);
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    button, select, input, textarea {
      font: inherit;
      max-width: 100%;
    }
    img, svg, canvas { display: block; max-width: 100%; }
    p, h1, h2, h3, h4 { overflow-wrap: break-word; }

    /* ============================================
       Header / Footer
       ============================================ */
    .topbar {
      position: sticky;
      top: 0;
      z-index: var(--z-topbar);
      display: flex;
      gap: var(--space-sm);
      align-items: center;
      padding: var(--space-sm) var(--space-md);
      background: color-mix(in oklab, var(--color-bg) 70%, black 30%);
      border-bottom: var(--border-width) solid var(--color-line);
      flex-wrap: wrap;
      min-height: 0;
    }
    .topbar-title {
      font-weight: 700;
      font-size: var(--font-size-md);
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .topbar-spacer { flex: 1; }
    .topbar select {
      border: var(--border-width) solid var(--color-line);
      background: var(--color-panel2);
      color: var(--color-fg);
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--ui-radius);
      font-size: var(--font-size-sm);
      cursor: pointer;
      min-width: 0;
      max-width: 120px;
    }

    .footer {
      position: sticky;
      bottom: 0;
      z-index: var(--z-topbar);
      display: flex;
      gap: var(--space-sm);
      align-items: center;
      justify-content: center;
      padding: var(--space-sm) var(--space-md);
      background: color-mix(in oklab, var(--color-bg) 70%, black 30%);
      border-top: var(--border-width) solid var(--color-line);
      flex-wrap: wrap;
    }
    .tabs { display: flex; gap: var(--space-xs); flex-shrink: 0; }
    .tabbtn {
      border: var(--border-width) solid var(--color-line);
      background: var(--color-panel2);
      color: var(--color-fg);
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--ui-radius-pill);
      cursor: pointer;
      transition: border-color var(--motion-normal), background var(--motion-normal);
      font-size: var(--font-size-sm);
      white-space: nowrap;
    }
    .tabbtn[aria-selected="true"] {
      border-color: color-mix(in oklab, var(--color-accent) 60%, var(--color-line) 40%);
      background: color-mix(in oklab, var(--color-panel2) 70%, var(--color-accent) 30%);
    }
    .theme-selector {
      border: var(--border-width) solid var(--color-line);
      background: var(--color-panel2);
      color: var(--color-fg);
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--ui-radius);
      font-size: var(--font-size-sm);
      cursor: pointer;
      min-width: 0;
    }

    /* Device button in header */
    .device-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      border: var(--border-width) solid var(--color-line);
      background: var(--color-panel2);
      color: var(--color-fg);
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--ui-radius);
      font-size: var(--font-size-sm);
      cursor: pointer;
      max-width: 140px;
      overflow: hidden;
    }
    .device-btn .icon { flex-shrink: 0; }
    .device-btn .text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Settings Popover */
    .popover-wrap {
      position: relative;
    }
    .popover {
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: var(--space-xs);
      min-width: 280px;
      max-width: 320px;
      background: var(--color-panel);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      box-shadow: var(--shadow-lg);
      z-index: 100;  /* フッターより前に表示 */
      display: none;
    }
    .popover.open { display: block; }
    .popover-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-sm);
      border-bottom: var(--border-width) solid var(--color-line);
      background: var(--color-panel2);
    }
    .popover-title {
      font-weight: 700;
      font-size: var(--font-size-sm);
    }
    .popover-close {
      background: none;
      border: none;
      color: var(--color-muted);
      cursor: pointer;
      font-size: var(--font-size-md);
      padding: 0;
      line-height: 1;
    }
    .popover-body {
      padding: var(--space-sm);
    }
    .popover-section {
      margin-bottom: var(--space-sm);
    }
    .popover-section:last-child { margin-bottom: 0; }
    .popover-label {
      font-size: var(--font-size-xs);
      color: var(--color-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-xs);
    }
    .popover-section select {
      width: 100%;
      max-width: none;
      box-sizing: border-box;
      border: var(--border-width) solid var(--color-line);
      background: var(--color-panel2);
      color: var(--color-fg);
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--ui-radius);
      font-size: var(--font-size-sm);
      cursor: pointer;
    }
    .popover-section select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    /* Radio list (unused but kept for reference) */
    .radio-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }
    .radio-item {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-xs);
      border-radius: var(--ui-radius);
      cursor: pointer;
      font-size: var(--font-size-sm);
    }
    .radio-item:hover { background: var(--color-panel2); }
    .radio-item input { margin: 0; }
    /* Checkbox list for MIDI */
    .checkbox-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      max-height: 120px;
      overflow-y: auto;
      padding: var(--space-xs);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      background: var(--color-panel2);
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-xs);
      border-radius: calc(var(--ui-radius) - 2px);
      cursor: pointer;
      font-size: var(--font-size-sm);
      flex-shrink: 0;
    }
    .checkbox-item:hover { background: var(--color-panel); }
    .checkbox-item input { margin: 0; }
    .badge {
      font-size: var(--font-size-xs);
      padding: 2px var(--space-sm);
      border-radius: var(--ui-radius-pill);
      border: var(--border-width) solid var(--color-line);
      color: var(--color-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 150px;
      flex-shrink: 1;
    }
    .badge.ok {
      border-color: color-mix(in oklab, var(--color-accent) 45%, var(--color-line) 55%);
      color: color-mix(in oklab, var(--color-accent) 70%, var(--color-fg) 30%);
    }
    .badge.bad {
      border-color: color-mix(in oklab, var(--color-bad) 45%, var(--color-line) 55%);
      color: color-mix(in oklab, var(--color-bad) 75%, var(--color-fg) 25%);
    }
    .wrap {
      padding: var(--space-md);
      container-type: inline-size;
      container-name: wrap;
    }
    .wrap.disabled {
      opacity: 0.4;
      pointer-events: none;
      filter: grayscale(0.5);
    }
    /* disabled状態でもテキスト入力は許可 */
    .wrap.disabled .text-input,
    .wrap.disabled .text-input-ctrl {
      pointer-events: auto;
      opacity: 1;
      filter: none;
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      align-items: center;
      width: 100%;
    }
    /* デスクトップ: 2カラム、縦幅stretch (Container Query) */
    @container wrap (min-width: 800px) {
      .grid {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        align-items: stretch;  /* 縦幅を揃える */
      }
      .grid > .panel {
        display: flex;
        flex-direction: column;
      }
      .grid > .panel > .panel-body {
        flex: 1;  /* bodyが余白を埋める */
      }
    }

    /* ============================================
       Panel System (統一コンテナ)
       - 全コンテナはpanelを使用
       - ヘッダーは必須（タイトル空でも表示）

       Modes:
       - fixed (default): --container-width 固定
       - expand: デスクトップで --container-width-expand に拡張
       ============================================ */

    .panel {
      --local-cols: var(--cols);
      width: 100%;
      max-width: var(--container-width);
      background: var(--color-panel);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      overflow: hidden;
      box-sizing: border-box;
    }

    /* Expand mode: panel自体をコンテナとして定義 */
    .panel--expand {
      container-type: inline-size;
      container-name: panel;
    }

    /* モバイル時のデフォルト: 縦並び */
    .panel--expand .panel-columns {
      display: block;
    }
    .panel--expand .panel-col {
      padding: var(--container-padding);
    }
    .panel--expand .panel-col:first-child {
      border-bottom: var(--border-width) solid var(--color-line);
    }

    /* デスクトップ: 2カラム構造 (Container Query) */
    @container wrap (min-width: 800px) {
      .panel--expand {
        max-width: calc(var(--container-width) * 2 + var(--panel-gap));
      }
      .panel--expand .panel-body {
        padding: 0;
      }
      .panel--expand .panel-columns {
        display: flex;
        gap: var(--panel-gap);
        position: relative;
      }
      /* 各カラム: 通常パネルと同じ幅で固定 */
      .panel--expand .panel-col {
        flex: 0 0 var(--container-width);
        min-width: 0;
        padding: var(--container-padding);
        box-sizing: border-box;
      }
      .panel--expand .panel-col:first-child {
        border-bottom: none;
      }
      /* グリッドは左寄せ（通常パネルと揃える） */
      .panel--expand .panel-col .ctrl-grid {
        justify-content: start;
      }
      /* 中央のセパレータ（gapの中央に配置） */
      .panel--expand .panel-columns::before {
        content: '';
        position: absolute;
        left: var(--container-width);
        top: 0;
        bottom: 0;
        width: var(--border-width);
        background: var(--color-line);
        margin-left: calc((var(--panel-gap) - var(--border-width)) / 2);
      }
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--container-padding);
      background: var(--color-panel2);
      border-bottom: var(--border-width) solid var(--color-line);
      height: 36px;
      box-sizing: border-box;
    }
    .panel-title {
      font-weight: 700;
      font-size: var(--font-size-sm);
      letter-spacing: 0.02em;
      line-height: 1;
    }
    .panel-actions {
      display: flex;
      gap: var(--space-xs);
      align-items: center;
    }
    .panel-body {
      padding: var(--container-padding);
    }
    .section {
      margin-bottom: var(--space-sm);
    }
    .section:last-child {
      margin-bottom: 0;
    }
    .section-header {
      font-size: var(--font-size-xs);
      color: var(--color-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: var(--space-xs) var(--space-sm);
      margin-bottom: var(--space-xs);
      border-bottom: var(--border-width) solid var(--color-line);
    }

    .row { display: flex; gap: var(--space-sm); align-items: center; flex-wrap: wrap; }
    .col { display: flex; flex-direction: column; gap: var(--space-xs); min-width: 0; flex: 1 1 120px; }
    .label { color: var(--color-muted); font-size: var(--font-size-sm); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hr { height: 1px; background: var(--color-line); margin: var(--space-sm) 0; }
    .small { font-size: var(--font-size-xs); color: var(--color-muted); overflow-wrap: break-word; }
    .scope-wrap { margin-bottom: var(--space-sm); }
    .scope-wrap .label { margin-bottom: var(--space-xs); white-space: normal; }

    .kit {
      display: grid;
      gap: var(--space-xs);
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    }

    .ctrl {
      display: grid;
      gap: var(--space-xs);
      justify-items: center;
      padding: var(--space-sm);
      border-radius: var(--ui-radius);
      border: var(--border-width) solid var(--color-line);
      background: color-mix(in oklab, var(--color-panel2) 70%, black 30%);
      user-select: none;
      min-width: 0;
      overflow: hidden;
    }
    .ctrl:focus-within {
      outline: none;
      box-shadow: inset 0 0 0 2px var(--color-accent);
    }
    .ctrl .label {
      font-size: var(--font-size-xs);
      text-align: center;
      width: 100%;
    }
    .readout {
      font-variant-numeric: tabular-nums;
      font-size: var(--font-size-xs);
      color: var(--color-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    .canvasBox {
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      overflow: hidden;
      background: var(--color-canvas);
    }
    .scope-wrap:last-child .canvasBox { margin-bottom: 0; }
    canvas { display: block; width: 100%; height: auto; }

    .btn {
      border: var(--border-width) solid var(--color-line);
      background: color-mix(in oklab, var(--color-panel2) 80%, black 20%);
      color: var(--color-fg);
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--ui-radius);
      cursor: pointer;
      font-size: var(--font-size-sm);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn.primary {
      border-color: color-mix(in oklab, var(--color-accent) 45%, var(--color-line) 55%);
      background: color-mix(in oklab, var(--color-accent) 18%, var(--color-panel2) 82%);
    }
    .btn.warn {
      border-color: color-mix(in oklab, var(--color-warn) 45%, var(--color-line) 55%);
      background: color-mix(in oklab, var(--color-warn) 16%, var(--color-panel2) 84%);
    }
    .btn.active {
      border-color: var(--color-accent);
      background: color-mix(in oklab, var(--color-accent) 25%, var(--color-panel2) 75%);
    }

    /* LED付きトグルボタン */
    .btn-led {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
    }
    .btn-led .led {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      background: var(--color-muted);
      opacity: 0.4;
      transition: background var(--motion-normal), opacity var(--motion-normal), box-shadow var(--motion-normal);
    }
    .btn-led.active .led {
      background: var(--color-good);
      opacity: 1;
      box-shadow: 0 0 6px var(--color-good);
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius-pill);
      padding: var(--space-xs) var(--space-sm);
      background: var(--color-panel2);
      font-size: var(--font-size-sm);
      flex-shrink: 0;
    }
    .toggle input { width: 14px; height: 14px; flex-shrink: 0; }

    .learn { display: flex; gap: var(--space-xs); align-items: center; flex-wrap: wrap; margin-bottom: var(--space-sm); }
    .list {
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      overflow: hidden;
      margin-top: var(--space-sm);
    }
    .listRow {
      display: flex;
      justify-content: space-between;
      gap: var(--space-sm);
      padding: var(--space-xs) var(--space-sm);
      border-top: var(--border-width) solid var(--color-line);
      font-size: var(--font-size-xs);
      color: var(--color-muted);
      min-width: 0;
    }
    .listRow:first-child { border-top: none; }
    .listRow strong { color: var(--color-fg); font-weight: 600; overflow: hidden; text-overflow: ellipsis; }
    .listRow span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .nodeWrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-sm);
      container-type: inline-size;
      container-name: nodeWrap;
    }
    @container wrap (min-width: 980px) { .nodeWrap { grid-template-columns: minmax(280px, 360px) 1fr; } }
    .nodePanel {
      background: var(--color-panel);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      padding: var(--space-sm);
      min-width: 0;
      overflow: hidden;
    }
    .nodeCanvas {
      position: relative;
      height: clamp(300px, 50vh, 560px);
      background: var(--color-canvas);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      overflow: hidden;
    }
    .node {
      position: absolute;
      width: clamp(140px, 20vw, 190px);
      background: color-mix(in oklab, var(--color-panel) 85%, black 15%);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      padding: var(--space-sm);
      cursor: grab;
      user-select: none;
    }
    .nodeHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-xs);
      gap: var(--space-xs);
    }
    .nodeTitle { font-weight: 700; font-size: var(--font-size-sm); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nodePorts { display: flex; justify-content: space-between; gap: var(--space-sm); }
    .portCol { display: flex; flex-direction: column; gap: var(--space-xs); }
    .port {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      font-size: var(--font-size-xs);
      color: var(--color-muted);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: var(--ui-radius-round);
      background: var(--color-line);
      border: var(--border-width) solid color-mix(in oklab, var(--color-accent) 40%, var(--color-line) 60%);
      flex-shrink: 0;
    }
    .dot.out { background: color-mix(in oklab, var(--color-accent) 60%, var(--color-line) 40%); }
    .dot.in { background: color-mix(in oklab, var(--color-warn) 60%, var(--color-line) 40%); }
    .dot.armed { box-shadow: inset 0 0 0 2px color-mix(in oklab, var(--color-accent) 70%, white 30%); }
    svg.wires { position: absolute; inset: 0; pointer-events: none; }

    textarea {
      width: 100%;
      min-height: 60px;
      background: var(--color-panel2);
      color: var(--color-fg);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      padding: var(--space-sm);
      font-size: var(--font-size-xs);
      resize: vertical;
    }

    select {
      min-width: 0;
      max-width: 100%;
    }

    /* Knob SVG styles via tokens */
    .knob-track { stroke: color-mix(in oklab, var(--color-fg) 12%, transparent 88%); }
    .knob-fill { stroke: var(--color-accent); }
    .knob-indicator { fill: var(--color-fg); }
    .knob-face { fill: color-mix(in oklab, var(--color-fg) 6%, transparent 94%); }

    /* === Control Grid System ===
       1 unit = 22px (defined as --unit in :root)
       Panel width = 16 units (352px) + padding (16px) = 368px for mobile

       Knob:         4×4 (88×88)
       H-Slider:     8×2 (sm), 16×2 (full width)
       V-Slider:     1×4, 1×8, 2×4, 2×8
       Toggle:       2×2, 4×2
       RadioGroup:   4×2, 8×2
       Dropdown:     4×2, 8×2
       StepSeq:      8×2, 16×2
       SegmentDisp:  4×2
       XYPad:        4×4, 8×8
       Goniometer:   4×4, 8×8
       PhaseMeter:   4×4
       WaveSelector: 4×4
       Waveform:     8×4, 16×4
       Spectrum:     8×4, 16×4
       PeakMeter:    1×4, 1×8, 2×4, 2×8
       StereoMeter:  2×4, 2×8, 4×4, 4×8
       LEDBar:       1×4, 1×8
       Keyboard:     12×2, 16×2 (full width)
    */
    .ctrl-grid {
      display: grid;
      grid-template-columns: repeat(var(--local-cols, var(--cols)), var(--unit));
      grid-auto-rows: var(--unit);
      gap: 0;
      justify-content: center;  /* グリッドを中央揃え */
    }

    /* Grid component outer: themed radius */
    .ctrl-grid > * {
      border-radius: var(--ui-radius) !important;
    }
    /* Grid component inner: smaller radius for balanced look */
    .ctrl-grid > * *:not(.led):not(.white-key):not(.black-key) {
      border-radius: var(--ui-radius-inner) !important;
    }
    /* Exception: pill-shaped elements (toggle switch track) */
    .ctrl-grid .switch {
      border-radius: var(--ui-radius-pill) !important;
    }
    /* Exception: round elements (toggle knob, xy cursor) */
    .ctrl-grid .switch::after,
    .ctrl-grid .pad-cursor {
      border-radius: var(--ui-radius-round) !important;
    }

    /* === Control Base === */
    .ctrl {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      box-sizing: border-box;
      border: 1px solid var(--color-line);
      background: var(--color-panel2);
      padding: 4px;
      /* グリッド内でのマージン（コンポーネント間の間隔） */
      margin: 1px;
    }
    .ctrl .label {
      font-size: var(--font-size-xs);
      line-height: 1.2;
      text-align: center;
      color: var(--color-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
    .ctrl .readout {
      font-size: var(--font-size-xs);
      line-height: 1.2;
      color: var(--color-fg);
    }
    /* MIDI Learn states */
    .ctrl.learnable {
      cursor: pointer;
      border-color: var(--color-accent);
    }
    .ctrl.learning {
      border-color: var(--color-warn);
      box-shadow: 0 0 8px var(--color-warn);
    }
    .ctrl.mapped {
      border-color: var(--color-good);
    }
    /* Synth Demo MIDI Learn states */
    .ctrl.synth-learning, .keyboard.synth-learning {
      border-color: var(--color-warn);
      box-shadow: 0 0 8px var(--color-warn);
    }

    /* === Knob: 4×4 (88×88 at 22px unit) === */
    .knob {
      grid-column: span 4;
      grid-row: span 4;
    }
    .knob svg { width: calc(var(--unit) * 2.5); height: calc(var(--unit) * 2.5); }  /* 55px */

    /* === H-Slider: 横幅×縦幅バリエーション ===
       縦幅1: 4x1, 8x1, 12x1, 16x1
       縦幅2: 4x2, 8x2, 12x2, 16x2 */
    [class*="hslider--"] {
      flex-direction: row;
      justify-content: flex-start;
      gap: 4px;
      align-items: center;
    }
    /* 縦幅1グリッド */
    .hslider--4x1, .hslider--8x1, .hslider--12x1, .hslider--16x1 { grid-row: span 1; padding: 2px 4px; }
    .hslider--4x1 { grid-column: span 4; }
    .hslider--8x1 { grid-column: span 8; }
    .hslider--12x1 { grid-column: span 12; }
    .hslider--16x1 { grid-column: span 16; }
    /* 縦幅2グリッド */
    .hslider--4x2, .hslider--8x2, .hslider--12x2, .hslider--16x2 { grid-row: span 2; padding: 4px 6px; }
    .hslider--4x2 { grid-column: span 4; }
    .hslider--8x2 { grid-column: span 8; }
    .hslider--12x2 { grid-column: span 12; }
    .hslider--16x2 { grid-column: span 16; }
    /* 後方互換: sm/md/lg -> 8x1/12x1/16x1 */
    .hslider--xs { grid-column: span 4; grid-row: span 1; padding: 2px 4px; }
    .hslider--sm { grid-column: span 8; grid-row: span 1; padding: 2px 4px; }
    .hslider--md { grid-column: span 12; grid-row: span 1; padding: 2px 4px; }
    .hslider--lg { grid-column: span 16; grid-row: span 1; padding: 2px 4px; }
    /* ラベル: 固定幅 */
    [class*="hslider--"] .label {
      flex: 0 0 28px;
      width: 28px;
      font-size: var(--font-size-xs);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* スライダー: 残り幅を使用 */
    [class*="hslider--"] .slider-wrap {
      flex: 1;
      min-width: 0;
    }
    /* readout: 固定幅（数値変動でフェーダー長が変わらないように） */
    [class*="hslider--"] .readout {
      flex: 0 0 36px;
      width: 36px;
      text-align: right;
      font-size: var(--font-size-xs);
      overflow: hidden;
    }
    /* 4x1, 4x2: 幅が狭いのでreadout非表示 */
    .hslider--4x1 .readout, .hslider--4x2 .readout, .hslider--xs .readout { display: none; }

    /* === V-Slider: 横幅2グリッド固定、縦幅バリエーション ===
       short: 2×4    tall: 2×8 */
    .vslider--short {
      grid-column: span 2;
      grid-row: span 4;
      padding: 4px 4px;
    }
    .vslider--tall {
      grid-column: span 2;
      grid-row: span 8;
      padding: 6px 4px;
    }
    /* 後方互換: thin/wideを新サイズにマップ */
    .vslider--thin-short, .vslider--wide-short {
      grid-column: span 2;
      grid-row: span 4;
      padding: 4px 4px;
    }
    .vslider--thin-tall, .vslider--wide-tall {
      grid-column: span 2;
      grid-row: span 8;
      padding: 6px 4px;
    }
    .vslider--short .slider-wrap, .vslider--tall .slider-wrap,
    .vslider--thin-short .slider-wrap, .vslider--thin-tall .slider-wrap,
    .vslider--wide-short .slider-wrap, .vslider--wide-tall .slider-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      justify-content: center;
    }

    /* === Slider input === */
    .slider-wrap { display: flex; align-items: center; }
    input.slider-h { width: 100%; height: 14px; margin: 0; }
    input.slider-v {
      width: 14px;
      height: 100%;
      margin: 0;
      writing-mode: vertical-lr;
      direction: rtl;
    }

    /* === Peak Meter === */
    .peak-meter {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 2px;
      background: var(--color-panel2);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      box-sizing: border-box;
    }
    .peak-meter--thin-short { grid-column: span 1; grid-row: span 4; padding: 4px 2px; }
    .peak-meter--thin-tall { grid-column: span 1; grid-row: span 8; padding: 6px 2px; }
    .peak-meter--wide-short { grid-column: span 2; grid-row: span 4; padding: 4px 4px; }
    .peak-meter--wide-tall { grid-column: span 2; grid-row: span 8; padding: 6px 4px; }
    .peak-meter .clip-indicator {
      width: 100%;
      height: 6px;
      background: var(--color-line);
      border-radius: var(--ui-radius-inner);
      flex-shrink: 0;
    }
    .peak-meter .clip-indicator.clipped { background: var(--color-bad); }
    .peak-meter .meter-bar-wrap {
      flex: 1;
      width: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: var(--color-canvas);
      border-radius: var(--ui-radius-inner);
      overflow: hidden;
    }
    .peak-meter .meter-bar {
      width: 100%;
      background: linear-gradient(to top, var(--color-good), var(--color-warn) 70%, var(--color-bad) 95%);
      transition: height 50ms ease-out;
    }
    .peak-meter .label { font-size: 9px; flex-shrink: 0; color: var(--color-muted); }

    /* === Stereo Meter === */
    .stereo-meter {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: var(--color-panel2);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      box-sizing: border-box;
    }
    .stereo-meter--2x4 { grid-column: span 2; grid-row: span 4; padding: 4px 2px; }
    .stereo-meter--2x8 { grid-column: span 2; grid-row: span 8; padding: 6px 2px; }
    .stereo-meter--4x4 { grid-column: span 4; grid-row: span 4; padding: 4px 4px; }
    .stereo-meter--4x8 { grid-column: span 4; grid-row: span 8; padding: 6px 4px; }
    .stereo-meter .meter-pair {
      flex: 1;
      width: 100%;
      display: flex;
      gap: 2px;
      min-height: 0;
    }
    .stereo-meter .meter-channel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: var(--color-canvas);
      border-radius: var(--ui-radius-inner);
      overflow: hidden;
    }
    .stereo-meter .meter-bar {
      width: 100%;
      background: linear-gradient(to top, var(--color-good), var(--color-warn) 70%, var(--color-bad) 95%);
      transition: height 50ms ease-out;
    }
    .stereo-meter .label { font-size: 9px; flex-shrink: 0; color: var(--color-muted); }

    /* === Waveform Display === */
    .waveform {
      position: relative;
      background: var(--color-canvas);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      box-sizing: border-box;
      overflow: hidden;
    }
    .waveform--4x4 { grid-column: span 4; grid-row: span 4; }
    .waveform--8x4 { grid-column: span 8; grid-row: span 4; }
    .waveform--8x8 { grid-column: span 8; grid-row: span 8; }
    .waveform--16x4 { grid-column: span 16; grid-row: span 4; }
    .waveform--16x8 { grid-column: span 16; grid-row: span 8; }
    .waveform canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .waveform .label {
      position: absolute;
      top: 4px;
      left: 6px;
      font-size: 9px;
      color: var(--color-muted);
      pointer-events: none;
    }

    /* === Spectrum Display === */
    .spectrum {
      position: relative;
      background: var(--color-canvas);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      box-sizing: border-box;
      overflow: hidden;
    }
    .spectrum--4x4 { grid-column: span 4; grid-row: span 4; }
    .spectrum--8x4 { grid-column: span 8; grid-row: span 4; }
    .spectrum--8x8 { grid-column: span 8; grid-row: span 8; }
    .spectrum--16x4 { grid-column: span 16; grid-row: span 4; }
    .spectrum--16x8 { grid-column: span 16; grid-row: span 8; }
    .spectrum canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .spectrum .label {
      position: absolute;
      top: 4px;
      left: 6px;
      font-size: 9px;
      color: var(--color-muted);
      pointer-events: none;
    }

    /* === Phase Meter (Correlation) === */
    .phase-meter {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--color-panel2);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      box-sizing: border-box;
      padding: 4px;
    }
    .phase-meter--4x4 { grid-column: span 4; grid-row: span 4; }
    .phase-meter canvas {
      flex: 1;
      width: 100%;
      min-height: 0;
      background: var(--color-canvas);
      border-radius: var(--ui-radius-inner);
    }
    .phase-meter .label { font-size: 9px; color: var(--color-muted); }
    .phase-meter .readout { font-size: 9px; font-variant-numeric: tabular-nums; }

    /* === Goniometer / XY Scope === */
    .goniometer {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--color-panel2);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      box-sizing: border-box;
      padding: 4px;
    }
    .goniometer--4x4 { grid-column: span 4; grid-row: span 4; }
    .goniometer--8x8 { grid-column: span 8; grid-row: span 8; }
    .goniometer canvas {
      flex: 1;
      aspect-ratio: 1;
      max-width: 100%;
      max-height: 100%;
      background: var(--color-canvas);
      border-radius: var(--ui-radius-inner);
    }
    .goniometer .label { font-size: 9px; color: var(--color-muted); }

    /* === Toggle Switch === */
    .toggle {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--color-panel2);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      box-sizing: border-box;
      cursor: pointer;
      gap: 2px;
    }
    .toggle--2x2 { grid-column: span 2; grid-row: span 2; padding: 2px; }
    .toggle--4x2 { grid-column: span 4; grid-row: span 2; padding: 4px 8px; flex-direction: row; gap: 6px; }
    .toggle .switch {
      width: 28px;
      height: 16px;
      background: var(--color-line);
      border-radius: var(--ui-radius-pill);
      position: relative;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .toggle .switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      background: var(--color-fg);
      border-radius: var(--ui-radius-round);
      transition: transform 0.15s;
    }
    .toggle.on .switch { background: var(--color-accent); }
    .toggle.on .switch::after { transform: translateX(12px); }
    .toggle .label { font-size: 9px; }

    /* === Radio Button Group === */
    .radio-group {
      display: flex;
      align-items: center;
      background: var(--color-panel2);
      border: 1px solid var(--color-line);
      box-sizing: border-box;
      gap: 2px;
    }
    .radio-group--4x2 { grid-column: span 4; grid-row: span 2; padding: 4px; }
    .radio-group--8x2 { grid-column: span 8; grid-row: span 2; padding: 4px 6px; }
    .radio-group .radio-option {
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      background: var(--color-canvas);
      cursor: pointer;
      transition: background 0.1s;
    }
    .radio-group .radio-option:hover { background: var(--color-line); }
    .radio-group .radio-option.selected {
      background: var(--color-accent);
      color: var(--color-canvas);
    }

    /* === Step Sequencer Row === */
    .step-seq {
      display: flex;
      align-items: center;
      background: var(--color-panel2);
      border: 1px solid var(--color-line);
      box-sizing: border-box;
      gap: 2px;
    }
    .step-seq--8x2 { grid-column: span 8; grid-row: span 2; padding: 4px; }
    .step-seq--16x2 { grid-column: span 16; grid-row: span 2; padding: 4px; }
    .step-seq .step {
      flex: 1;
      height: 100%;
      background: var(--color-canvas);
      cursor: pointer;
      transition: background 0.1s;
    }
    .step-seq .step:hover { background: var(--color-line); }
    .step-seq .step.active { background: var(--color-accent); }
    .step-seq .step.current { box-shadow: inset 0 0 0 2px var(--color-warn); }

    /* === XY Pad === */
    .xy-pad {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--color-panel2);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      box-sizing: border-box;
    }
    .xy-pad--4x4 { grid-column: span 4; grid-row: span 4; padding: 4px; }
    .xy-pad--8x8 { grid-column: span 8; grid-row: span 8; padding: 6px; }
    .xy-pad .pad-area {
      flex: 1;
      width: 100%;
      min-height: 0;
      background: var(--color-canvas);
      border-radius: var(--ui-radius-inner);
      position: relative;
      cursor: crosshair;
    }
    .xy-pad .pad-cursor {
      position: absolute;
      width: 10px;
      height: 10px;
      background: var(--color-accent);
      border: 2px solid var(--color-fg);
      border-radius: var(--ui-radius-round);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .xy-pad .label { font-size: 9px; color: var(--color-muted); }

    .dropdown .value {

      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;

      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid var(--color-muted);
      flex-shrink: 0;

    .dropdown-menu {
      position: absolute;
      background: var(--color-panel);
      border: 1px solid var(--color-line);
      border-radius: var(--ui-radius);

      z-index: 100;

      background: var(--color-panel2);
      border: var(--border-width) solid var(--color-line);
      border-radius: var(--ui-radius);
      box-sizing: border-box;

    .led-bar--1x8 { grid-column: span 1; grid-row: span 8; padding: 6px 2px; }
    .led-bar .leds {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column-reverse;
      gap: 1px;
      min-height: 0;
    }
    .led-bar .led {
      flex: 1;
      width: 100%;
      background: var(--color-line);
      border-radius: 0;
    }
    /* First LED (top): round top corners */
    .led-bar .led:last-child {
      border-radius: var(--ui-radius) var(--ui-radius) 0 0;
    }
    /* Last LED (bottom): round bottom corners */

      border-radius: 0 0 var(--ui-radius) var(--ui-radius);

    .led-bar .led.on-green { background: var(--color-good); }
    .led-bar .led.on-yellow { background: var(--color-warn); }

    .keyboard {

    .keyboard .white-keys {

    /* === Level Meter (VU) === */
    .vu-meter {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 100%;

    .vu-bar {
      flex: 1;
      background: var(--color-line);

    .vu-fill {
      position: absolute;

    .vu-meter--v .vu-fill {
      left: 0; right: 0; bottom: 0; height: 0%;
      background: linear-gradient(to top, var(--color-accent), var(--color-warn) 75%, var(--color-bad) 95%);
    }
    .vu-peak {
      position: absolute;
      background: var(--color-fg);
    }
    .vu-meter--h .vu-peak { width: 2px; top: 0; bottom: 0; left: 0%; }
    .vu-meter--v .vu-peak { height: 2px; left: 0; right: 0; bottom: 0%; }
    .vu-stereo { display: flex; gap: var(--space-xs); }
    .vu-stereo--h { flex-direction: column; }
    .vu-stereo--v { flex-direction: row; }
    .vu-label { font-size: var(--font-size-xs); color: var(--color-muted); text-align: center; }

    /* === Rotary Selector (Knob-style) === */
    .rotary-sel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-xs);
    }
    .rotary-sel .readout {
      background: var(--color-panel2);

    /* === Segmented Control === */

  <!-- AudioWorklet Processor (inline for demo) -->
  <script id="worklet-processor" type="worklet">
    class FilterProcessor extends AudioWorkletProcessor {
      static get parameterDescriptors() {
        return [
          { name: 'cutoff', defaultValue: 1200, minValue: 20, maxValue: 20000, automationRate: 'a-rate' },
          { name: 'resonance', defaultValue: 0.7, minValue: 0.1, maxValue: 20, automationRate: 'a-rate' },
          { name: 'preGain', defaultValue: 1.0, minValue: 0, maxValue: 4, automationRate: 'a-rate' },
          { name: 'outGain', defaultValue: 1.0, minValue: 0, maxValue: 4, automationRate: 'a-rate' },
        ];
      }

      constructor() {
        super();
        // Simple 2-pole lowpass filter state (per channel)
        this.state = [
          { y1: 0, y2: 0 }, // left
          { y1: 0, y2: 0 }, // right
        ];
        this.bypassed = false;
        this.port.onmessage = (e) => {
          if (e.data.type === 'bypass') {
            this.bypassed = e.data.value;
          }
        };
      }

      process(inputs, outputs, parameters) {
        const input = inputs[0];
        const output = outputs[0];
        if (!input || !input.length) return true;

        const cutoff = parameters.cutoff;
        const resonance = parameters.resonance;
        const preGain = parameters.preGain;
        const outGain = parameters.outGain;

        const sampleRate = globalThis.sampleRate || 44100;

        for (let ch = 0; ch < output.length; ch++) {
          const inp = input[ch] || input[0];
          const out = output[ch];
          const st = this.state[ch] || this.state[0];

          for (let i = 0; i < out.length; i++) {
            const fc = cutoff.length > 1 ? cutoff[i] : cutoff[0];
            const Q = resonance.length > 1 ? resonance[i] : resonance[0];
            const pre = preGain.length > 1 ? preGain[i] : preGain[0];
            const og = outGain.length > 1 ? outGain[i] : outGain[0];

            const x = inp[i] * pre;

            if (this.bypassed) {
              out[i] = x * og;
              continue;
            }

            // Compute biquad coefficients for lowpass
            const omega = 2 * Math.PI * Math.min(fc, sampleRate * 0.45) / sampleRate;
            const sinOmega = Math.sin(omega);
            const cosOmega = Math.cos(omega);
            const alpha = sinOmega / (2 * Q);

            const b0 = (1 - cosOmega) / 2;
            const b1 = 1 - cosOmega;
            const b2 = (1 - cosOmega) / 2;
            const a0 = 1 + alpha;
            const a1 = -2 * cosOmega;
            const a2 = 1 - alpha;

            // Normalize
            const nb0 = b0 / a0;
            const nb1 = b1 / a0;
            const nb2 = b2 / a0;
            const na1 = a1 / a0;
            const na2 = a2 / a0;

            // Direct Form II Transposed
            const y = nb0 * x + st.y1;
            st.y1 = nb1 * x - na1 * y + st.y2;
            st.y2 = nb2 * x - na2 * y;

            out[i] = y * og;
          }
        }
        return true;
      }
    }

    registerProcessor('filter-processor', FilterProcessor);
  </script>

  <script type="module">
    const $ = (q, r = document) => r.querySelector(q);
    const wrap = $('#wrap');
    const statusEl = $('#status');

    /* ============================================
       Domain Layer
       ============================================ */

    const clamp01 = (x) => Math.max(0, Math.min(1, x));

    // Scale functions
    const Scale = {
      linear: (min, max) => ({
        toValue: (v01) => min + clamp01(v01) * (max - min),
        to01: (val) => clamp01((val - min) / (max - min)),
      }),
      log: (min, max) => ({
        toValue: (v01) => min * Math.pow(max / min, clamp01(v01)),
        to01: (val) => clamp01(Math.log(val / min) / Math.log(max / min)),
      }),
      db: (minDb, maxDb) => ({
        toValue: (v01) => Math.pow(10, (minDb + clamp01(v01) * (maxDb - minDb)) / 20),
        to01: (gain) => clamp01((20 * Math.log10(Math.max(1e-6, gain)) - minDb) / (maxDb - minDb)),
      }),
    };

    // Unit formatters
    const Format = {
      hz: (x) => (x >= 1000 ? (x / 1000).toFixed(2) + ' k' : x.toFixed(0)),
      db: (g) => (20 * Math.log10(Math.max(1e-6, g))).toFixed(1),
      q: (x) => x.toFixed(2),
    };

    // Param factory (0..1 as single source of truth)
    function createParam({ id, label, unit, def01, scale, format }) {
      const def = clamp01(def01);
      let v01 = def;
      const listeners = new Set();

      return {
        id,
        label,
        unit,
        get01: () => v01,
        set01: (x01, { silent = false } = {}) => {
          v01 = clamp01(x01);
          if (!silent) {
            for (const fn of listeners) fn(v01);
          }
        },
        getValue: () => scale.toValue(v01),
        reset: () => {
          v01 = def;
          for (const fn of listeners) fn(v01);
        },
        display: () => format(scale.toValue(v01)) + (unit ? ' ' + unit : ''),
        on: (fn) => {
          listeners.add(fn);
          return () => listeners.delete(fn);
        },
        learnName: () => label,
      };
    }

    /* ============================================
       UI Headless Layer (no rendering, pure logic)
       ============================================ */

    function createKnobLogic({ param, fineScale = 0.25, normalScale = 1.0 }) {
      let dragging = false;
      let startY = 0;
      let startV = 0;
      let lastPointerUpTime = 0;
      let hasMoved = false;

      const DRAG_SENSITIVITY = 0.006;
      const WHEEL_STEP = 0.03;
      const FINE_WHEEL_STEP = 0.01;
      const KEY_STEP = 0.05;
      const FINE_KEY_STEP = 0.01;
      const DOUBLE_CLICK_THRESHOLD = 300;

      return {
        // Pointer handlers
        onPointerDown: (e) => {
          dragging = true;
          hasMoved = false;
          startY = e.clientY;
          startV = param.get01();
        },
        onPointerMove: (e) => {
          if (!dragging) return false;
          const scale = e.shiftKey ? fineScale : normalScale;
          const dy = startY - e.clientY;
          // Only consider it a move if we've moved more than a few pixels
          if (Math.abs(dy) > 2) {
            hasMoved = true;
          }
          param.set01(startV + dy * DRAG_SENSITIVITY * scale);
          return true;
        },
        onPointerUp: () => {
          const now = Date.now();
          const wasDragging = dragging;
          dragging = false;

          // Double-click detection: only reset if we didn't drag
          if (!hasMoved && wasDragging) {
            if (now - lastPointerUpTime < DOUBLE_CLICK_THRESHOLD) {
              param.reset();
              lastPointerUpTime = 0; // Prevent triple-click
              return;
            }
          }
          lastPointerUpTime = now;
        },
        onPointerCancel: () => {
          dragging = false;
          hasMoved = false;
        },

        // Wheel handler
        onWheel: (e) => {
          const step = e.shiftKey ? FINE_WHEEL_STEP : WHEEL_STEP;
          param.set01(param.get01() + (e.deltaY < 0 ? step : -step));
        },

        // Keyboard handler
        onKeyDown: (e) => {
          const step = e.shiftKey ? FINE_KEY_STEP : KEY_STEP;
          switch (e.key) {
            case 'ArrowUp':
            case 'ArrowRight':
              e.preventDefault();
              param.set01(param.get01() + step);
              break;
            case 'ArrowDown':
            case 'ArrowLeft':
              e.preventDefault();
              param.set01(param.get01() - step);
              break;
            case 'Home':
              e.preventDefault();
              param.set01(0);
              break;
            case 'End':
              e.preventDefault();
              param.set01(1);
              break;
          }
        },

        isDragging: () => dragging,
      };
    }

    /* ============================================
       UI Styled Layer (rendering only, uses tokens)
       ============================================ */

    // Knob View using stroke-dashoffset (recommended method)
    function createKnobView({ size = 64, strokeWidth = 6 }) {
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', String(size));
      svg.setAttribute('height', String(size));
      svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
      svg.style.touchAction = 'none';
      svg.style.outline = 'none';
      svg.setAttribute('tabindex', '0');
      svg.setAttribute('role', 'slider');

      const cx = size / 2;
      const cy = size / 2;
      const r = (size - strokeWidth) / 2 - 4;

      // Arc span: 270 degrees (from 135° to 405° = -225° to 45°)
      const startAngle = 135; // degrees
      const arcSpan = 270; // degrees

      // Calculate circumference for the arc portion
      const fullCircumference = 2 * Math.PI * r;
      const arcLength = (arcSpan / 360) * fullCircumference;

      // Face circle
      const face = document.createElementNS(svg.namespaceURI, 'circle');
      face.setAttribute('cx', String(cx));
      face.setAttribute('cy', String(cy));
      face.setAttribute('r', String(r + 1));
      face.classList.add('knob-face');

      // Background track (fixed arc)
      const track = document.createElementNS(svg.namespaceURI, 'circle');
      track.setAttribute('cx', String(cx));
      track.setAttribute('cy', String(cy));
      track.setAttribute('r', String(r));
      track.setAttribute('fill', 'none');
      track.setAttribute('stroke-width', String(strokeWidth));
      track.setAttribute('stroke-linecap', 'round');
      track.classList.add('knob-track');
      // Rotate to start at bottom-left
      track.setAttribute('transform', `rotate(${startAngle} ${cx} ${cy})`);
      track.setAttribute('stroke-dasharray', `${arcLength} ${fullCircumference}`);

      // Fill arc (animated via dashoffset)
      const fill = document.createElementNS(svg.namespaceURI, 'circle');
      fill.setAttribute('cx', String(cx));
      fill.setAttribute('cy', String(cy));
      fill.setAttribute('r', String(r));
      fill.setAttribute('fill', 'none');
      fill.setAttribute('stroke-width', String(strokeWidth));
      fill.setAttribute('stroke-linecap', 'round');
      fill.classList.add('knob-fill');
      fill.setAttribute('transform', `rotate(${startAngle} ${cx} ${cy})`);
      fill.setAttribute('stroke-dasharray', `${arcLength} ${fullCircumference}`);

      // Indicator dot (rotates with value)
      const indicator = document.createElementNS(svg.namespaceURI, 'circle');
      indicator.setAttribute('r', '3');
      indicator.classList.add('knob-indicator');

      svg.append(face, track, fill, indicator);

      function render(value01) {
        const v = clamp01(value01);

        // stroke-dashoffset method: offset from full to show progress
        const fillLength = arcLength * v;
        const offset = arcLength - fillLength;
        fill.setAttribute('stroke-dashoffset', String(offset));

        // Indicator position
        const angle = startAngle + arcSpan * v;
        const rad = (angle * Math.PI) / 180;
        const ix = cx + r * Math.cos(rad);
        const iy = cy + r * Math.sin(rad);
        indicator.setAttribute('cx', String(ix));
        indicator.setAttribute('cy', String(iy));

        // ARIA
        svg.setAttribute('aria-valuenow', String(Math.round(v * 100)));
      }

      svg.setAttribute('aria-valuemin', '0');
      svg.setAttribute('aria-valuemax', '100');

      return { el: svg, render };
    }

    // Complete Knob component (combines headless + styled)
    // Single size: 4×4 (96×96px)
    function Knob({ label, param, onGestureStart }) {
      const s = 60, w = 6;

      const el = document.createElement('div');
      el.className = 'ctrl knob';

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;

      const view = createKnobView({ size: s, strokeWidth: w });
      const logic = createKnobLogic({ param });

      const readout = document.createElement('div');
      readout.className = 'readout';

      el.append(labelEl, view.el, readout);

      function render() {
        view.render(param.get01());
        readout.textContent = param.display();
      }

      el.addEventListener('pointerdown', () => {
        if (onGestureStart) onGestureStart(param);
      });

      view.el.addEventListener('pointerdown', (e) => {
        logic.onPointerDown(e);
        view.el.setPointerCapture(e.pointerId);
      });
      view.el.addEventListener('pointermove', (e) => logic.onPointerMove(e));
      view.el.addEventListener('pointerup', () => logic.onPointerUp());
      view.el.addEventListener('pointercancel', () => logic.onPointerCancel());
      view.el.addEventListener('wheel', (e) => { e.preventDefault(); logic.onWheel(e); }, { passive: false });
      view.el.addEventListener('keydown', (e) => logic.onKeyDown(e));

      param.on(() => render());
      render();

      return {
        el,
        render,
        setNormalized: (v) => param.set01(v),
      };
    }

    // Rotary Selector (knob-style discrete selector)
    // Single size: 4×4 (96×96px)
    function RotarySelector({ label, options, defaultIndex = 0, onChange }) {
      const s = 60, w = 6;

      const el = document.createElement('div');
      el.className = 'ctrl knob';

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;

      let currentIndex = defaultIndex;
      const total = options.length;

      const param = {
        get01: () => currentIndex / Math.max(1, total - 1),
        set01: (v) => {
          const newIdx = Math.round(clamp01(v) * (total - 1));
          if (newIdx !== currentIndex) {
            currentIndex = newIdx;
            render();
            if (onChange) onChange(options[currentIndex], currentIndex);
          }
        },
        reset: () => { currentIndex = defaultIndex; render(); if (onChange) onChange(options[currentIndex], currentIndex); },
      };

      const view = createKnobView({ size: s, strokeWidth: w });
      const logic = createKnobLogic({ param });

      const readout = document.createElement('div');
      readout.className = 'readout';

      el.append(labelEl, view.el, readout);

      function render() {
        view.render(param.get01());
        readout.textContent = options[currentIndex] || '';
      }

      view.el.addEventListener('pointerdown', (e) => { logic.onPointerDown(e); view.el.setPointerCapture(e.pointerId); });
      view.el.addEventListener('pointermove', (e) => logic.onPointerMove(e));
      view.el.addEventListener('pointerup', () => logic.onPointerUp());
      view.el.addEventListener('pointercancel', () => logic.onPointerCancel());
      view.el.addEventListener('wheel', (e) => { e.preventDefault(); logic.onWheel(e); }, { passive: false });
      view.el.addEventListener('keydown', (e) => logic.onKeyDown(e));

      render();
      return { el, getValue: () => options[currentIndex], getIndex: () => currentIndex };
    }

    // Slider sizes:
    //   Horizontal (h): '4x1', '8x1', '12x1', '16x1', '4x2', '8x2', '12x2', '16x2'
    //   Vertical (v): 'short' (2x4), 'tall' (2x8)
    //   後方互換: sm->8x1, md->12x1, lg->16x1, xs->4x1
    function Slider({ label, param, onGestureStart, orientation = 'h', size = '8x1' }) {
      const el = document.createElement('div');
      const prefix = orientation === 'h' ? 'hslider' : 'vslider';
      let sizeClass = size;
      if (orientation === 'h') {
        // 後方互換マッピング
        if (size === 'xs') sizeClass = '4x1';
        else if (size === 'sm') sizeClass = '8x1';
        else if (size === 'md') sizeClass = '12x1';
        else if (size === 'lg') sizeClass = '16x1';
      } else {
        // 縦スライダー: 旧名を新名にマップ
        if (size === 'sm' || size === 'thin-short' || size === 'wide-short') sizeClass = 'short';
        else if (size === 'md' || size === 'thin-tall' || size === 'wide-tall') sizeClass = 'tall';
      }
      el.className = `ctrl ${prefix}--${sizeClass}`;

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;

      const wrap = document.createElement('div');
      wrap.className = 'slider-wrap';

      const input = document.createElement('input');
      input.type = 'range';
      input.min = '0';
      input.max = '1';
      input.step = '0.001';
      input.value = String(param.get01());
      input.className = `slider-${orientation}`;

      wrap.append(input);

      const readout = document.createElement('div');
      readout.className = 'readout';

      el.append(labelEl, wrap, readout);

      function render() {
        input.value = String(param.get01());
        readout.textContent = param.display();
      }

      el.addEventListener('pointerdown', () => {
        if (onGestureStart) onGestureStart(param);
      });

      el.addEventListener('dblclick', () => param.reset());

      input.addEventListener('input', () => param.set01(Number(input.value)));
      param.on(() => render());
      render();

      return {
        el,
        render,
        setNormalized: (v) => param.set01(v),
      };
    }

    // Text Input component
    function TextInput({ label, placeholder = '', value = '', onChange, multiline = false, gridSize }) {
      // デフォルトサイズ: 単行は8x2、複数行は8x4
      const defaultSize = multiline ? '8x4' : '8x2';
      const size = gridSize || defaultSize;

      const el = document.createElement('div');
      el.className = 'ctrl text-input-ctrl';
      const [cols, rows] = size.split('x').map(Number);
      el.style.gridColumn = `span ${cols}`;
      el.style.gridRow = `span ${rows}`;

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;

      const input = multiline ? document.createElement('textarea') : document.createElement('input');
      input.className = 'text-input';
      input.placeholder = placeholder;
      input.value = value;
      if (!multiline) input.type = 'text';

      el.append(labelEl, input);

      input.addEventListener('input', () => { if (onChange) onChange(input.value); });
      input.addEventListener('change', () => { if (onChange) onChange(input.value); });

      return {
        el,
        getValue: () => input.value,
        setValue: (v) => { input.value = v; },
        focus: () => input.focus(),
      };
    }

    // Shell/Terminal display component
    function Shell({ maxLines = 100, gridSize = '16x6' }) {
      const el = document.createElement('div');
      el.className = 'shell';
      const [cols, rows] = gridSize.split('x').map(Number);
      el.style.gridColumn = `span ${cols}`;
      el.style.gridRow = `span ${rows}`;

      const lines = [];

      function addLine(text, type = '') {
        const p = document.createElement('p');
        p.className = 'shell-line' + (type ? ` shell-line--${type}` : '');
        p.textContent = text;
        lines.push(p);
        if (lines.length > maxLines) {
          const old = lines.shift();
          old.remove();
        }
        el.append(p);
        el.scrollTop = el.scrollHeight;
      }

      return {
        el,
        log: (text) => addLine(text),
        info: (text) => addLine(text, 'info'),
        warn: (text) => addLine(text, 'warn'),
        error: (text) => addLine(text, 'error'),
        prompt: (text) => addLine('> ' + text, 'prompt'),
        clear: () => { lines.length = 0; el.replaceChildren(); },
      };
    }

    // Multi-select component (for MIDI devices etc)
    function MultiSelect({ label, items = [], onChange, gridSize = '8x4' }) {
      const el = document.createElement('div');
      el.className = 'ctrl';
      const [cols, rows] = gridSize.split('x').map(Number);
      el.style.gridColumn = `span ${cols}`;
      el.style.gridRow = `span ${rows}`;
      el.style.display = 'flex';
      el.style.flexDirection = 'column';
      el.style.gap = 'var(--space-xs)';
      el.style.overflow = 'auto';

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;
      labelEl.style.flexShrink = '0';
      labelEl.style.textAlign = 'left';

      const list = document.createElement('div');
      list.className = 'multi-select';

      el.append(labelEl, list);

      const selected = new Set();

      function render() {
        list.replaceChildren();
        for (const item of items) {
          const row = document.createElement('label');
          row.className = 'multi-select-item';

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = selected.has(item.id);
          cb.addEventListener('change', () => {
            if (cb.checked) selected.add(item.id);
            else selected.delete(item.id);
            if (onChange) onChange([...selected]);
          });

          const span = document.createElement('span');
          span.textContent = item.label || item.id;

          row.append(cb, span);
          list.append(row);
        }
      }

      render();

      return {
        el,
        setItems: (newItems) => { items = newItems; render(); },
        getSelected: () => [...selected],
        setSelected: (ids) => { selected.clear(); ids.forEach(id => selected.add(id)); render(); },
      };
    }

    // === Button ===
    // size: '2x2', '4x2', '8x2'
    function Button({ label, onClick, variant = 'default', size = '4x2' }) {

    // === Encoder (無限回転表示) ===
    // size: '4x4'
    function Encoder({ label, onChange, sensitivity = 0.01 }) {
      const el = document.createElement('div');
      el.className = 'ctrl knob';

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      const size = 60;
      svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
      svg.setAttribute('width', size);
      svg.setAttribute('height', size);
      svg.setAttribute('tabindex', '0');
      svg.style.cursor = 'pointer';
      svg.style.outline = 'none';

      // 背景円
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      bg.setAttribute('cx', size/2);
      bg.setAttribute('cy', size/2);
      bg.setAttribute('r', size/2 - 4);
      bg.setAttribute('fill', 'var(--color-panel)');
      bg.setAttribute('stroke', 'var(--color-line)');
      bg.setAttribute('stroke-width', '2');

      // インジケーター
      const indicator = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      indicator.setAttribute('x1', size/2);
      indicator.setAttribute('y1', 8);
      indicator.setAttribute('x2', size/2);
      indicator.setAttribute('y2', 16);
      indicator.setAttribute('stroke', 'var(--color-accent)');
      indicator.setAttribute('stroke-width', '3');
      indicator.setAttribute('stroke-linecap', 'round');

      svg.append(bg, indicator);

      const readout = document.createElement('div');
      readout.className = 'readout';
      readout.textContent = '0';

      el.append(labelEl, svg, readout);

      let angle = 0;
      let dragging = false;
      let lastY = 0;

      function render() {
        indicator.setAttribute('transform', `rotate(${angle}, ${size/2}, ${size/2})`);
      }

      svg.addEventListener('pointerdown', (e) => {
        dragging = true;
        lastY = e.clientY;
        svg.setPointerCapture(e.pointerId);
      });
      svg.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        const delta = lastY - e.clientY;
        lastY = e.clientY;
        angle = (angle + delta * 3) % 360;
        render();
        if (onChange) onChange(delta * sensitivity);
      });
      svg.addEventListener('pointerup', () => { dragging = false; });
      svg.addEventListener('pointercancel', () => { dragging = false; });

      render();

      return {
        el,
        setAngle: (a) => { angle = a; render(); },
        setReadout: (text) => { readout.textContent = text; },
      };
    }

    // === Label (静的テキスト表示) ===

    // === Histogram (レベル履歴表示) ===
    // size: '8x4', '16x4'
    function Histogram({ label, bars = 32, size = '8x4' }) {
      const el = document.createElement('div');
      el.className = 'ctrl';
      const [cols, rows] = size.split('x').map(Number);
      el.style.gridColumn = `span ${cols}`;
      el.style.gridRow = `span ${rows}`;
      el.style.display = 'flex';
      el.style.flexDirection = 'column';
      el.style.padding = '4px';

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;
      labelEl.style.marginBottom = '2px';

      const canvas = document.createElement('canvas');
      canvas.style.flex = '1';
      canvas.style.width = '100%';
      canvas.style.background = 'var(--color-canvas)';
      canvas.style.borderRadius = '2px';

      el.append(labelEl, canvas);

      const data = new Float32Array(bars);
      let ctx = null;

      function resize() {
        canvas.width = canvas.offsetWidth * devicePixelRatio;
        canvas.height = canvas.offsetHeight * devicePixelRatio;
        ctx = canvas.getContext('2d');
        ctx.scale(devicePixelRatio, devicePixelRatio);
        draw();
      }

      function draw() {
        if (!ctx) return;
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;
        ctx.clearRect(0, 0, w, h);
        const barW = w / bars;
        ctx.fillStyle = getComputedStyle(el).getPropertyValue('--color-accent') || '#ff9f43';
        for (let i = 0; i < bars; i++) {
          const barH = data[i] * h;
          ctx.fillRect(i * barW + 1, h - barH, barW - 2, barH);
        }
      }

      requestAnimationFrame(resize);
      new ResizeObserver(resize).observe(canvas);

      return {
        el,
        push: (value) => {
          for (let i = 0; i < bars - 1; i++) data[i] = data[i + 1];
          data[bars - 1] = clamp01(value);
          draw();
        },
        setData: (arr) => {
          for (let i = 0; i < bars; i++) data[i] = arr[i] || 0;
          draw();
        },
      };
    }
