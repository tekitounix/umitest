    // === EnvelopeEditor (ADSR曲線エディタ) ===
    // size: '8x4', '16x4'
    function EnvelopeEditor({ label = 'Envelope', onChange, size = '8x4' }) {
      const el = document.createElement('div');
      el.className = 'ctrl';
      const [cols, rows] = size.split('x').map(Number);
      el.style.gridColumn = `span ${cols}`;
      el.style.gridRow = `span ${rows}`;
      el.style.display = 'flex';
      el.style.flexDirection = 'column';
      el.style.padding = '4px';

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;
      labelEl.style.marginBottom = '2px';

      const canvas = document.createElement('canvas');
      canvas.style.flex = '1';
      canvas.style.width = '100%';
      canvas.style.background = 'var(--color-canvas)';
      canvas.style.borderRadius = '2px';
      canvas.style.cursor = 'crosshair';

      el.append(labelEl, canvas);

      // ADSR: attack, decay, sustain, release (0-1 normalized)
      const adsr = { a: 0.1, d: 0.2, s: 0.7, r: 0.3 };
      let ctx = null;
      let dragging = null;

      function resize() {
        canvas.width = canvas.offsetWidth * devicePixelRatio;
        canvas.height = canvas.offsetHeight * devicePixelRatio;
        ctx = canvas.getContext('2d');
        ctx.scale(devicePixelRatio, devicePixelRatio);
        draw();
      }

      function draw() {
        if (!ctx) return;
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;
        const pad = 4;
        ctx.clearRect(0, 0, w, h);

        // Calculate points
        const totalTime = adsr.a + adsr.d + 0.3 + adsr.r;  // sustain duration fixed for display
        const scaleX = (w - pad * 2) / totalTime;
        const points = [
          { x: pad, y: h - pad },  // start
          { x: pad + adsr.a * scaleX, y: pad },  // attack peak
          { x: pad + (adsr.a + adsr.d) * scaleX, y: pad + (1 - adsr.s) * (h - pad * 2) },  // decay to sustain
          { x: pad + (adsr.a + adsr.d + 0.3) * scaleX, y: pad + (1 - adsr.s) * (h - pad * 2) },  // sustain end
          { x: w - pad, y: h - pad },  // release end
        ];

        // Draw curve
        ctx.strokeStyle = getComputedStyle(el).getPropertyValue('--color-accent') || '#ff9f43';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.stroke();

        // Draw handles
        ctx.fillStyle = ctx.strokeStyle;
        points.slice(1, 4).forEach((p, i) => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function getHandle(x, y) {
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;
        const pad = 4;
        const totalTime = adsr.a + adsr.d + 0.3 + adsr.r;
        const scaleX = (w - pad * 2) / totalTime;
        const points = [
          { x: pad + adsr.a * scaleX, y: pad, key: 'a' },
          { x: pad + (adsr.a + adsr.d) * scaleX, y: pad + (1 - adsr.s) * (h - pad * 2), key: 'd' },
          { x: pad + (adsr.a + adsr.d + 0.3) * scaleX, y: pad + (1 - adsr.s) * (h - pad * 2), key: 's' },
        ];
        for (const p of points) {
          if (Math.hypot(x - p.x, y - p.y) < 10) return p.key;
        }
        return null;
      }

      canvas.onpointerdown = (e) => {
        const rect = canvas.getBoundingClientRect();
        dragging = getHandle(e.clientX - rect.left, e.clientY - rect.top);
        if (dragging) canvas.setPointerCapture(e.pointerId);
      };
      canvas.onpointermove = (e) => {
        if (!dragging) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;

        if (dragging === 'a') {
          adsr.a = clamp01(x / w) * 0.5;
        } else if (dragging === 'd') {
          adsr.d = clamp01((x / w - adsr.a) * 2);
          adsr.s = clamp01(1 - (y / h));
        } else if (dragging === 's') {
          adsr.s = clamp01(1 - (y / h));
        }
        draw();
        if (onChange) onChange({ ...adsr });
      };
      canvas.onpointerup = () => { dragging = null; };

      requestAnimationFrame(resize);
      new ResizeObserver(resize).observe(canvas);

      return {
        el,
        getADSR: () => ({ ...adsr }),
        setADSR: (a, d, s, r) => {
          adsr.a = a; adsr.d = d; adsr.s = s; adsr.r = r;
          draw();
        },
      };
    }

    // === FilterGraph (周波数特性表示) ===
    // size: '8x4', '16x4'
    function FilterGraph({ label = 'Filter', size = '8x4' }) {
      const el = document.createElement('div');
      el.className = 'ctrl';
      const [cols, rows] = size.split('x').map(Number);
      el.style.gridColumn = `span ${cols}`;
      el.style.gridRow = `span ${rows}`;
      el.style.display = 'flex';
      el.style.flexDirection = 'column';
      el.style.padding = '4px';

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;
      labelEl.style.marginBottom = '2px';

      const canvas = document.createElement('canvas');
      canvas.style.flex = '1';
      canvas.style.width = '100%';
      canvas.style.background = 'var(--color-canvas)';
      canvas.style.borderRadius = '2px';

      el.append(labelEl, canvas);

      let ctx = null;
      let frequencies = null;
      let magnitudes = null;

      function resize() {
        canvas.width = canvas.offsetWidth * devicePixelRatio;
        canvas.height = canvas.offsetHeight * devicePixelRatio;
        ctx = canvas.getContext('2d');
        ctx.scale(devicePixelRatio, devicePixelRatio);
        draw();
      }

      function draw() {
        if (!ctx) return;
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;
        ctx.clearRect(0, 0, w, h);

        // Grid lines
        ctx.strokeStyle = 'var(--color-line)';
        ctx.lineWidth = 0.5;
        for (let db = -24; db <= 12; db += 12) {
          const y = h / 2 - (db / 36) * h;
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(w, y);
          ctx.stroke();
        }

        if (!magnitudes || magnitudes.length === 0) {
          // Default flat response
          ctx.strokeStyle = getComputedStyle(el).getPropertyValue('--color-accent') || '#ff9f43';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(0, h / 2);
          ctx.lineTo(w, h / 2);
          ctx.stroke();
          return;
        }

        // Draw frequency response
        ctx.strokeStyle = getComputedStyle(el).getPropertyValue('--color-accent') || '#ff9f43';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < magnitudes.length; i++) {
          const x = (i / magnitudes.length) * w;
          const db = 20 * Math.log10(Math.max(0.001, magnitudes[i]));
          const y = h / 2 - (db / 36) * h;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      requestAnimationFrame(resize);
      new ResizeObserver(resize).observe(canvas);

      return {
        el,
        setResponse: (freqs, mags) => {
          frequencies = freqs;
          magnitudes = mags;
          draw();
        },
        // Helper to generate response from BiquadFilterNode
        fromBiquad: (filter, nPoints = 128) => {
          const freqArray = new Float32Array(nPoints);
          const magArray = new Float32Array(nPoints);
          const phaseArray = new Float32Array(nPoints);
          for (let i = 0; i < nPoints; i++) {
            freqArray[i] = 20 * Math.pow(10, i / nPoints * 3);  // 20Hz to 20kHz log scale
          }
          filter.getFrequencyResponse(freqArray, magArray, phaseArray);
          frequencies = freqArray;
          magnitudes = magArray;
          draw();
        },
        // Simulate filter response without actual BiquadFilter
        setFilter: (type, cutoff, q) => {
          const nPoints = 128;
          const sampleRate = 48000;
          magnitudes = new Float32Array(nPoints);
          for (let i = 0; i < nPoints; i++) {
            const freq = 20 * Math.pow(10, i / nPoints * 3);
            const w = freq / cutoff;
            let mag;
            if (type === 'lowpass') {
              mag = 1 / Math.sqrt(1 + Math.pow(w, 4) / (q * q));
            } else if (type === 'highpass') {
              mag = (w * w) / Math.sqrt(1 + Math.pow(w, 4) / (q * q));
            } else if (type === 'bandpass') {
              mag = (w / q) / Math.sqrt(Math.pow(1 - w * w, 2) + Math.pow(w / q, 2));
            } else {
              mag = 1;
            }
            magnitudes[i] = Math.min(10, Math.max(0.001, mag));
          }
          draw();
        },
      };
    }

    // === Audio Device Selector ===
    // Wraps Web Audio API device enumeration
    // size: '4x2', '6x2', '8x2', '8x4', '12x4'
    function AudioDeviceSelector({ label = 'Audio Output', kind = 'audiooutput', onChange }) {
      const el = document.createElement('div');
      el.className = 'col';

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;

      const select = document.createElement('select');
      select.className = 'theme-selector';
      select.style.width = '100%';

      el.append(labelEl, select);

      let devices = [];

      async function enumerate() {
        try {
          await navigator.mediaDevices.getUserMedia({ audio: true });
          const all = await navigator.mediaDevices.enumerateDevices();
          devices = all.filter(d => d.kind === kind);
          render();
        } catch (e) {
          select.innerHTML = '<option>Permission denied</option>';
        }
      }

      function render() {
        select.innerHTML = '';
        if (devices.length === 0) {
          select.innerHTML = '<option>No devices</option>';
          return;
        }
        devices.forEach((d, i) => {
          const opt = document.createElement('option');
          opt.value = d.deviceId;
          opt.textContent = d.label || `Device ${i + 1}`;
          select.append(opt);
        });
      }

      select.addEventListener('change', () => {
        if (onChange) onChange(select.value, devices.find(d => d.deviceId === select.value));
      });

      navigator.mediaDevices?.addEventListener('devicechange', enumerate);

      return {
        el,
        enumerate,
        getSelected: () => select.value,
        setSelected: (id) => { select.value = id; },
        getDevices: () => devices,
      };
    }

    // === MIDI Device Selector ===
    // Wraps Web MIDI API
    // size: '4x2', '6x2', '8x2', '8x4', '12x4'
    function MIDIDeviceSelector({ label = 'MIDI Input', direction = 'input', onChange }) {
      const el = document.createElement('div');
      el.className = 'col';

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;

      const list = document.createElement('div');
      list.className = 'multi-select';

      el.append(labelEl, list);

      let midiAccess = null;
      const selected = new Set();

      function render() {
        list.replaceChildren();
        if (!midiAccess) {
          const msg = document.createElement('div');
          msg.className = 'small';
          msg.textContent = 'MIDI not available';
          list.append(msg);
          return;
        }

        const ports = direction === 'input' ? midiAccess.inputs : midiAccess.outputs;
        if (ports.size === 0) {
          const msg = document.createElement('div');
          msg.className = 'small';
          msg.textContent = 'No devices';
          list.append(msg);
          return;
        }

        ports.forEach((port) => {
          const row = document.createElement('label');
          row.className = 'multi-select-item';

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = selected.has(port.id);
          cb.addEventListener('change', () => {
            if (cb.checked) selected.add(port.id);
            else selected.delete(port.id);
            if (onChange) onChange([...selected], port);
          });

          const span = document.createElement('span');
          span.textContent = port.name || port.id;

          row.append(cb, span);
          list.append(row);
        });
      }

      async function init() {
        try {
          midiAccess = await navigator.requestMIDIAccess();
          midiAccess.addEventListener('statechange', render);
          render();
        } catch (e) {
          render();
        }
      }

      return {
        el,
        init,
        getSelected: () => [...selected],
        setSelected: (ids) => { selected.clear(); ids.forEach(id => selected.add(id)); render(); },
        getMIDIAccess: () => midiAccess,
        getPort: (id) => {
          if (!midiAccess) return null;
          const ports = direction === 'input' ? midiAccess.inputs : midiAccess.outputs;
          return ports.get(id);
        },
      };
    }

        draw: (data) => {
          if (!ctx) return;
          const w = canvas.width, h = canvas.height;
          ctx.clearRect(0, 0, w, h);
          const barWidth = w / data.length;
          const accent = getComputedStyle(document.documentElement).getPropertyValue('--color-accent').trim() || '#00a3ff';
          ctx.fillStyle = accent;
          for (let i = 0; i < data.length; i++) {
            const barHeight = (data[i] / 255) * h;
            ctx.fillRect(i * barWidth, h - barHeight, barWidth - 1, barHeight);
          }
        }
      };
    }

    // === Phase Meter (Correlation Meter) ===
    // size: '4x4', '8x2'
    function PhaseMeter({ label = 'Phase', size = '4x4' }) {
      const el = document.createElement('div');
      el.className = `phase-meter phase-meter--${size}`;

      const canvas = document.createElement('canvas');
      el.append(canvas);

      const readout = document.createElement('div');
      readout.className = 'readout';
      readout.textContent = '0.00';

      if (label) {
        const lbl = document.createElement('div');
        lbl.className = 'label';
        lbl.textContent = label;
        el.append(lbl);
      }
      el.append(readout);

      let ctx = null;
      const resizeObserver = new ResizeObserver(() => {
        canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1);
        canvas.height = canvas.clientHeight * (window.devicePixelRatio || 1);
        ctx = canvas.getContext('2d');
      });
      resizeObserver.observe(canvas);

      return {
        el,
        setCorrelation: (v) => {
          readout.textContent = v.toFixed(2);
          if (!ctx) return;
          const w = canvas.width, h = canvas.height;
          ctx.clearRect(0, 0, w, h);

          // Draw scale
          ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--color-line').trim() || '#333';
          ctx.beginPath();
          ctx.moveTo(0, h / 2);
          ctx.lineTo(w, h / 2);
          ctx.stroke();

          // Draw indicator
          const x = ((v + 1) / 2) * w;
          ctx.fillStyle = v < 0 ? getComputedStyle(document.documentElement).getPropertyValue('--color-warn').trim() :
                          getComputedStyle(document.documentElement).getPropertyValue('--color-good').trim();
          ctx.beginPath();
          ctx.arc(x, h / 2, 6, 0, Math.PI * 2);
          ctx.fill();
        }
      };
    }

    // === Goniometer / XY Scope ===
    // size: '4x4', '6x6', '8x8'
    function Goniometer({ label = '', size = '4x4' }) {
      const el = document.createElement('div');
      el.className = `goniometer goniometer--${size}`;

      const canvas = document.createElement('canvas');
      el.append(canvas);

      if (label) {
        const lbl = document.createElement('div');
        lbl.className = 'label';
        lbl.textContent = label;
        el.append(lbl);
      }

      let ctx = null;
      const resizeObserver = new ResizeObserver(() => {
        const size = Math.min(canvas.clientWidth, canvas.clientHeight);
        canvas.width = size * (window.devicePixelRatio || 1);
        canvas.height = size * (window.devicePixelRatio || 1);
        ctx = canvas.getContext('2d');
      });
      resizeObserver.observe(canvas);

      return {
        el,
        draw: (leftData, rightData) => {
          if (!ctx) return;
          const w = canvas.width, h = canvas.height;
          ctx.fillStyle = 'rgba(0,0,0,0.1)';
          ctx.fillRect(0, 0, w, h);

          ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--color-accent').trim() || '#00a3ff';
          ctx.lineWidth = 1;
          ctx.beginPath();

          const len = Math.min(leftData.length, rightData.length);
          for (let i = 0; i < len; i++) {
            const l = leftData[i], r = rightData[i];
            // M/S transform for 45° rotation
            const x = ((r - l) / 2 + 0.5) * w;
            const y = (1 - (l + r) / 2 - 0.5) * h + h / 2;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
      };
    }

      const el = document.createElement('div');

      return {
        el,
        getState: () => [...state],
        setState: (newState) => {

              state[i] = v;
              stepEls[i].classList.toggle('active', v);
            }
          });

        setCurrentStep: (i) => {
          if (currentStep >= 0 && currentStep < steps) {
            stepEls[currentStep].classList.remove('current');

    // === XY Pad ===
    // size: '4x4', '8x8'
    function XYPad({ label = '', size = '4x4', onChange }) {
      const el = document.createElement('div');
      el.className = `xy-pad xy-pad--${size}`;

      const pad = document.createElement('div');
      pad.className = 'pad-area';

      const cursor = document.createElement('div');
      cursor.className = 'pad-cursor';
      cursor.style.left = '50%';
      cursor.style.top = '50%';
      pad.append(cursor);

      el.append(pad);

      if (label) {
        const lbl = document.createElement('div');
        lbl.className = 'label';
        lbl.textContent = label;
        el.append(lbl);
      }

      let x = 0.5, y = 0.5;
      let dragging = false;

      function update(e) {
        const rect = pad.getBoundingClientRect();
        x = clamp01((e.clientX - rect.left) / rect.width);
        y = clamp01((e.clientY - rect.top) / rect.height);
        cursor.style.left = `${x * 100}%`;
        cursor.style.top = `${y * 100}%`;
        if (onChange) onChange(x, 1 - y); // y inverted so up = 1
      }

      pad.addEventListener('pointerdown', (e) => {
        dragging = true;
        pad.setPointerCapture(e.pointerId);
        update(e);
      });
      pad.addEventListener('pointermove', (e) => {
        if (dragging) update(e);
      });
      pad.addEventListener('pointerup', () => dragging = false);
      pad.addEventListener('pointercancel', () => dragging = false);

      return {
        el,
        getValue: () => ({ x, y: 1 - y }),
        setValue: (nx, ny) => {
          x = clamp01(nx);
          y = clamp01(1 - ny);
          cursor.style.left = `${x * 100}%`;
          cursor.style.top = `${y * 100}%`;
        }
      };
    }

      if (label) {
        const lbl = document.createElement('div');
        lbl.className = 'label';
        lbl.textContent = label;

      const value = document.createElement('div');

      value.textContent = options[defaultIndex] || '';

      const arrow = document.createElement('div');
      arrow.className = 'arrow';
      el.append(arrow);

      let currentIndex = defaultIndex;
      let menu = null;

      function openMenu() {
        if (menu) return;
        menu = document.createElement('div');
        menu.className = 'dropdown-menu';
        const rect = el.getBoundingClientRect();
        menu.style.left = `${rect.left}px`;
        menu.style.top = `${rect.bottom + 2}px`;
        menu.style.minWidth = `${rect.width}px`;

        options.forEach((opt, i) => {
          const item = document.createElement('div');
          item.className = `option${i === currentIndex ? ' selected' : ''}`;
          item.textContent = opt;
          item.addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = i;
            value.textContent = opt;
            closeMenu();
            if (onChange) onChange(opt, i);
          });
          menu.append(item);
        });

        document.body.append(menu);

        setTimeout(() => {
          document.addEventListener('click', closeMenu, { once: true });
        }, 0);
      }

      function closeMenu() {
        if (menu) {
          menu.remove();
          menu = null;
        }
      }

      el.addEventListener('click', () => {
        if (menu) closeMenu();
        else openMenu();
      });

      return {
        el,
        getValue: () => options[currentIndex],
        getIndex: () => currentIndex,
        setIndex: (i) => {
          currentIndex = i;
          value.textContent = options[i] || '';
        }
      };
    }

    // === Piano Keyboard ===
    // size: '12x2' (1 octave), '24x2' (2 octaves)
    function Keyboard({ size = '12x2', startNote = 60, onNoteOn, onNoteOff }) {
      const el = document.createElement('div');
      el.className = `keyboard keyboard--${size}`;

      // 12x2: 1 octave, 16x2: 1 octave (wider keys)
      const octaves = 1;
      const whitePattern = [0, 2, 4, 5, 7, 9, 11]; // C D E F G A B
      const blackPattern = [1, 3, null, 6, 8, 10, null]; // C# D# - F# G# A# -

      const whiteKeys = document.createElement('div');
      whiteKeys.className = 'white-keys';

      const blackKeys = document.createElement('div');
      blackKeys.className = 'black-keys';

      const keyEls = new Map();

      for (let oct = 0; oct < octaves; oct++) {
        whitePattern.forEach((semitone, i) => {
          const note = startNote + oct * 12 + semitone;
          const key = document.createElement('div');
          key.className = 'white-key';
          key.dataset.note = note;
          keyEls.set(note, key);
          whiteKeys.append(key);

          // Black key slot
          const slot = document.createElement('div');
          slot.className = 'black-key-slot';
          const blackSemitone = blackPattern[i];
          if (blackSemitone !== null) {
            const blackNote = startNote + oct * 12 + blackSemitone;
            const blackKey = document.createElement('div');
            blackKey.className = 'black-key';
            blackKey.dataset.note = blackNote;
            keyEls.set(blackNote, blackKey);
            slot.append(blackKey);
          }
          blackKeys.append(slot);
        });
      }

      el.append(whiteKeys, blackKeys);

      // Mouse/touch handling
      let activeNote = null;

      function noteOn(note) {
        if (activeNote === note) return;
        if (activeNote !== null) noteOff(activeNote);
        activeNote = note;
        const keyEl = keyEls.get(note);
        if (keyEl) keyEl.classList.add('active');
        if (onNoteOn) onNoteOn(note);
      }

      function noteOff(note) {
        if (note === null) return;
        const keyEl = keyEls.get(note);
        if (keyEl) keyEl.classList.remove('active');
        if (onNoteOff) onNoteOff(note);
        if (activeNote === note) activeNote = null;
      }

      function handleStart(e) {
        e.preventDefault();
        const target = e.target;
        if (target.dataset.note) {
          noteOn(parseInt(target.dataset.note));
        }
      }

      function handleMove(e) {
        if (activeNote === null) return;
        const touch = e.touches ? e.touches[0] : e;
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        if (target && target.dataset.note) {
          const note = parseInt(target.dataset.note);
          if (note !== activeNote) {
            noteOn(note);
          }
        }
      }

      function handleEnd() {
        if (activeNote !== null) {
          noteOff(activeNote);
        }
      }

      el.addEventListener('mousedown', handleStart);
      el.addEventListener('mousemove', (e) => { if (e.buttons === 1) handleMove(e); });
      el.addEventListener('mouseup', handleEnd);
      el.addEventListener('mouseleave', handleEnd);
      el.addEventListener('touchstart', handleStart, { passive: false });
      el.addEventListener('touchmove', handleMove, { passive: false });
      el.addEventListener('touchend', handleEnd);

      return {
        el,
        noteOn: (note) => {
          const keyEl = keyEls.get(note);
          if (keyEl) keyEl.classList.add('active');
        },
        noteOff: (note) => {
          const keyEl = keyEls.get(note);
          if (keyEl) keyEl.classList.remove('active');
        },
        allNotesOff: () => {
          keyEls.forEach((keyEl) => keyEl.classList.remove('active'));
          activeNote = null;
        }
      };
    }

    /* ============================================
       Engine Layer (AudioWorklet based)
       ============================================ */

    async function createEngine() {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      const ctx = new Ctx({ latencyHint: 'interactive' });

      const inputGain = ctx.createGain();
      inputGain.gain.value = 1.0;

      const outputGain = ctx.createGain();
      outputGain.gain.value = 1.0;

      const analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;

      // AudioWorkletが使えるかチェック
      let useWorklet = false;
      let workletNode = null;
      let biquadFilter = null;

      try {
        if (ctx.audioWorklet) {
          const workletCode = $('#worklet-processor').textContent;
          const blob = new Blob([workletCode], { type: 'application/javascript' });
          const url = URL.createObjectURL(blob);
          await ctx.audioWorklet.addModule(url);
          URL.revokeObjectURL(url);

          workletNode = new AudioWorkletNode(ctx, 'filter-processor', {
            numberOfInputs: 1,
            numberOfOutputs: 1,
            outputChannelCount: [2],
          });
          useWorklet = true;
        }
      } catch (e) {
        // AudioWorklet not available, will use fallback
      }

      // フォールバック: BiquadFilterNode
      if (!useWorklet) {
        biquadFilter = ctx.createBiquadFilter();
        biquadFilter.type = 'lowpass';
        biquadFilter.frequency.value = 1200;
        biquadFilter.Q.value = 0.7;
      }

      // 接続
      if (useWorklet) {
        inputGain.connect(workletNode);
        workletNode.connect(outputGain);
      } else {
        inputGain.connect(biquadFilter);
        biquadFilter.connect(outputGain);
      }
      outputGain.connect(analyser);
      analyser.connect(ctx.destination);

      // シンセ用オシレーター（noteOn/noteOffで制御）
      let osc = null;
      let oscGain = null;

      function noteOn(freq) {
        if (osc) noteOff();
        osc = ctx.createOscillator();
        oscGain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        oscGain.gain.value = 0;
        osc.connect(oscGain);
        oscGain.connect(inputGain);
        osc.start();
        // Attack
        oscGain.gain.setTargetAtTime(1.0, ctx.currentTime, 0.01);
      }

      function noteOff() {
        if (!osc) return;
        const g = oscGain;
        const o = osc;
        // Release
        g.gain.setTargetAtTime(0, ctx.currentTime, 0.05);
        setTimeout(() => {
          try { o.stop(); } catch {}
          try { o.disconnect(); } catch {}
          try { g.disconnect(); } catch {}
        }, 200);
        osc = null;
        oscGain = null;
      }

      // MIDIノート番号から周波数へ変換
      function midiToFreq(note) {
        return 440 * Math.pow(2, (note - 69) / 12);
      }

      async function start() {
        await ctx.resume();
        setStatus(`Synth (${useWorklet ? 'Worklet' : 'Biquad'})`, true);
      }

      function stop() {
        noteOff();
        ctx.suspend().catch(() => {});
        setStatus('Stopped', false);
      }

      // Parameter setters (AudioWorklet or BiquadFilter)
      function setCutoff(hz) {
        if (useWorklet && workletNode) {
          workletNode.parameters.get('cutoff').setTargetAtTime(hz, ctx.currentTime, 0.015);
        } else if (biquadFilter) {
          biquadFilter.frequency.setTargetAtTime(hz, ctx.currentTime, 0.015);
        }
      }
      function setResonance(q) {
        if (useWorklet && workletNode) {
          workletNode.parameters.get('resonance').setTargetAtTime(q, ctx.currentTime, 0.015);
        } else if (biquadFilter) {
          biquadFilter.Q.setTargetAtTime(q, ctx.currentTime, 0.015);
        }
      }
      function setPreGain(g) {
        if (useWorklet && workletNode) {
          workletNode.parameters.get('preGain').setTargetAtTime(g, ctx.currentTime, 0.015);
        } else {
          inputGain.gain.setTargetAtTime(g, ctx.currentTime, 0.015);
        }
      }
      function setOutGain(g) {
        if (useWorklet && workletNode) {
          workletNode.parameters.get('outGain').setTargetAtTime(g, ctx.currentTime, 0.015);
        } else {
          outputGain.gain.setTargetAtTime(g, ctx.currentTime, 0.015);
        }
      }
      function setBypass(on) {
        if (useWorklet && workletNode) {
          workletNode.port.postMessage({ type: 'bypass', value: on });
        }
        // BiquadFilter fallbackではbypassは未対応
      }

      return {
        ctx,
        analyser,
        start,
        stop,
        noteOn,
        noteOff,
        midiToFreq,
        setCutoff,
        setResonance,
        setPreGain,
        setOutGain,
        setBypass,
      };
    }

    // === Panel Component (統一コンテナ) ===
    // title: パネルタイトル
    // actions: ヘッダー右側に配置する要素（オプション）
    // mode: 'fixed' (default) | 'expand'
    function Panel({ title = '', actions = null, mode = 'fixed' }) {
      const el = document.createElement('div');
      el.className = 'panel' + (mode === 'expand' ? ' panel--expand' : '');

      // ヘッダーは常に作成
      const header = document.createElement('div');
      header.className = 'panel-header';

      if (title) {
        const titleEl = document.createElement('div');
        titleEl.className = 'panel-title';
        titleEl.textContent = title;
        header.append(titleEl);
      }

      if (actions) {
        const actionsWrap = document.createElement('div');
        actionsWrap.className = 'panel-actions';
        if (Array.isArray(actions)) {
          actions.forEach(a => actionsWrap.append(a.el || a));
        } else {
          actionsWrap.append(actions.el || actions);
        }
        header.append(actionsWrap);
      }
      el.append(header);

      const body = document.createElement('div');
      body.className = 'panel-body';

      // Expand モード: 左右カラム構造
      let leftCol = null;
      let rightCol = null;
      if (mode === 'expand') {
        const cols = document.createElement('div');
        cols.className = 'panel-columns';
        leftCol = document.createElement('div');
        leftCol.className = 'panel-col';
        rightCol = document.createElement('div');
        rightCol.className = 'panel-col';
        cols.append(leftCol, rightCol);
        body.append(cols);
      }

      el.append(body);

      // 現在の追加先カラム（expand時）
      let currentCol = 'left';

      return {
        el,
        header,
        body,
        // Expand モード用: 右カラムに切り替え
        toRight: () => { currentCol = 'right'; },
        toLeft: () => { currentCol = 'left'; },
        append: (...children) => {
          const target = (mode === 'expand' && currentCol === 'right') ? rightCol : (leftCol || body);
          children.forEach(c => target.append(c.el || c));
        },
        appendGrid: (...children) => {
          const target = (mode === 'expand' && currentCol === 'right') ? rightCol : (leftCol || body);
          const grid = document.createElement('div');
          grid.className = 'ctrl-grid';
          children.forEach(c => grid.append(c.el || c));
          target.append(grid);
          return grid;
        },
        appendSection: (label, ...children) => {
          const target = (mode === 'expand' && currentCol === 'right') ? rightCol : (leftCol || body);
          const sec = document.createElement('div');
          sec.className = 'section';
          if (label) {
            const h = document.createElement('div');
            h.className = 'section-header';
            h.textContent = label;
            sec.append(h);
          }
          const grid = document.createElement('div');
          grid.className = 'ctrl-grid';
          children.forEach(c => grid.append(c.el || c));
          sec.append(grid);
          target.append(sec);
          return { section: sec, grid };
        }
      };
    }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    // Visualization components
    function Scope(label, fftSize, mode, size = '16x4') {
      const el = document.createElement('div');
      el.className = 'ctrl';
      const [cols, rows] = size.split('x').map(Number);
      el.style.gridColumn = `span ${cols}`;
      el.style.gridRow = `span ${rows}`;
      el.style.display = 'block';
      el.style.position = 'relative';
      el.style.overflow = 'hidden';
      el.style.background = 'var(--color-canvas)';
      el.style.padding = '0';

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;
      labelEl.style.position = 'absolute';
      labelEl.style.top = '4px';
      labelEl.style.left = '6px';
      labelEl.style.zIndex = '1';
      labelEl.style.pointerEvents = 'none';

      const canvas = document.createElement('canvas');
      canvas.width = 640;
      canvas.height = 160;
      canvas.style.display = 'block';
      canvas.style.width = '100%';
      canvas.style.height = '100%';
      const g = canvas.getContext('2d');
      const data = new Uint8Array(fftSize);
      el.append(canvas, labelEl);

      function draw(getData) {
        getData(data);
        const w = canvas.width;
        const h = canvas.height;
        g.clearRect(0, 0, w, h);
        g.fillStyle = 'rgba(255,255,255,0.06)';
        g.fillRect(0, 0, w, h);

        g.strokeStyle = 'rgba(255,255,255,0.15)';
        g.lineWidth = 1;
        g.beginPath();
        g.moveTo(0, h * 0.5);
        g.lineTo(w, h * 0.5);
        g.stroke();

        g.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--color-accent');
        g.lineWidth = 2;
        g.beginPath();

        if (mode === 'time') {
          for (let i = 0; i < data.length; i++) {
            const x = (i / (data.length - 1)) * w;
            const v = (data[i] - 128) / 128;
            const y = h * 0.5 - v * (h * 0.42);
            if (i === 0) g.moveTo(x, y);
            else g.lineTo(x, y);
          }
        } else {
          for (let i = 0; i < data.length; i++) {
            const x = (i / (data.length - 1)) * w;
            const v = data[i] / 255;
            const y = h - v * (h * 0.9) - h * 0.05;
            if (i === 0) g.moveTo(x, y);
            else g.lineTo(x, y);
          }
        }
        g.stroke();
      }

      return { el, draw };
    }

    // MIDI utilities
    async function requestMidiAccess() {
      if (!navigator.requestMIDIAccess) return null;
      try {
        return await navigator.requestMIDIAccess({ sysex: false });
      } catch {
        return null;
      }
    }

    function parseMidiCC(ev) {
      const d = ev.data;
      if (!d || d.length < 3) return null;
      const st = d[0] & 0xf0;
      const ch = d[0] & 0x0f;
      if (st !== 0xb0) return null;
      return { ch, cc: d[1], value: d[2] };
    }

    const keyForCC = (ch, cc) => `cc:${ch}:${cc}`;
    const v01From7bit = (v) => clamp01(Math.max(0, Math.min(127, v)) / 127);

    // Preset storage
    const PRESET_KEY = 'demo_presets_v2';
    function loadPresets() {
      try {
        return JSON.parse(localStorage.getItem(PRESET_KEY) || '[]');
      } catch {
        return [];
      }
    }
    function savePresets(list) {
      localStorage.setItem(PRESET_KEY, JSON.stringify(list));
    }

    // MIDI binding storage
    const MIDI_BINDING_KEY = 'midi_bindings_v1';
    function loadMidiBindings() {
      try {
        const data = JSON.parse(localStorage.getItem(MIDI_BINDING_KEY) || '{}');
        return {
          synthMap: data.synthMap || [],      // [[key, paramId], ...]
          controlsMap: data.controlsMap || [],
          noteChannel: data.noteChannel ?? null
        };
      } catch {
        return { synthMap: [], controlsMap: [], noteChannel: null };
      }
    }
    function saveMidiBindings(synthMap, controlsMap, noteChannel) {
      const data = {
        synthMap: [...synthMap.entries()],
        controlsMap: [...controlsMap.entries()].map(([k, v]) => [k, v.paramId]),
        noteChannel
      };
      localStorage.setItem(MIDI_BINDING_KEY, JSON.stringify(data));
    }

    function makePluginView() {

      // エンジン開始（ユーザージェスチャー内で呼ばれる必要あり）
      async function startEngine() {
        if (isRunning) return;

          // AudioContextはユーザージェスチャー内で作成する必要がある
          if (!engineP) {
            engineP = createEngine();
          }
          engine = await engineP;

          attachMidi();
          renderMap();
          renderPresets();

          // Apply current param values to engine
          for (const param of paramsList) {
            param.set01(param.get01());
          }

            await refreshMidiDevices();

      let synthLearnTarget = null;  // 'note' | paramId
      const synthMidiMap = new Map();  // CC key -> paramId
      let midiNoteChannel = null;  // null = any, or specific channel

      // Save MIDI bindings helper
      function persistMidiBindings() {
        saveMidiBindings(synthMidiMap, midiLearnMap, midiNoteChannel);
      }

      // Clear all Synth mappings
      function clearAllSynthMappings() {
        synthMidiMap.clear();
        midiNoteChannel = null;
        // Reset labels
        Object.values(synthLearnableKnobs).forEach(entry => {
          const labelEl = entry.control.el.querySelector('.label');
          if (labelEl) labelEl.textContent = entry.label;
          entry.control.el.classList.remove('mapped');
        });
        keyboard.el.classList.remove('mapped');
        persistMidiBindings();
      }

      // Clear single Synth mapping by paramId
      function clearSynthMapping(paramId) {
        for (const [key, pid] of synthMidiMap.entries()) {
          if (pid === paramId) {
            synthMidiMap.delete(key);
            break;
          }
        }
        const entry = synthLearnableKnobs[paramId];
        if (entry) {
          const labelEl = entry.control.el.querySelector('.label');
          if (labelEl) labelEl.textContent = entry.label;
          entry.control.el.classList.remove('mapped');
        }
        persistMidiBindings();
      }

      // Learn & Clear buttons in Synth Demo header
      const synthLearnBtn = document.createElement('button');
      synthLearnBtn.className = 'btn';
      synthLearnBtn.textContent = 'Learn';
      synthLearnBtn.onclick = () => {
        synthLearnMode = !synthLearnMode;
        if (synthLearnMode) {
          synthLearnBtn.textContent = 'Finish';
          synthLearnBtn.classList.add('active');
        } else {
          synthLearnBtn.textContent = 'Learn';
          synthLearnBtn.classList.remove('active');
          synthLearnTarget = null;
          document.querySelectorAll('.synth-learning').forEach(el => el.classList.remove('synth-learning'));

      };

      const synthClearBtn = document.createElement('button');
      synthClearBtn.className = 'btn';
      synthClearBtn.textContent = 'Clear';
      synthClearBtn.onclick = () => clearAllSynthMappings();

      paramsPanel.header.querySelector('.panel-title')?.after((() => {
        const wrap = document.createElement('div');
        wrap.className = 'panel-actions';
        wrap.append(synthLearnBtn, synthClearBtn);

      // Key Hold toggle
      let keyHold = false;
      const keyHoldWrap = document.createElement('div');
      keyHoldWrap.className = 'ctrl';
      keyHoldWrap.style.gridColumn = 'span 4';
      keyHoldWrap.style.gridRow = 'span 2';
      keyHoldWrap.style.display = 'flex';
      keyHoldWrap.style.alignItems = 'center';
      keyHoldWrap.style.justifyContent = 'center';
      const keyHoldBtn = document.createElement('button');
      keyHoldBtn.className = 'btn';
      keyHoldBtn.textContent = 'Key Hold';
      keyHoldBtn.onclick = () => {
        keyHold = !keyHold;

          engine.noteOff();
          keyboard.allNotesOff();
        }

      keyHoldWrap.append(keyHoldBtn);

      // Keyboard
      const keyboard = Keyboard({
        size: '16x2',
        startNote: 48,  // C3
        onNoteOn: (note) => {
          if (engine) {
            engine.noteOn(engine.midiToFreq(note));
          }
        },
        onNoteOff: (note) => {
          if (!keyHold && engine) {
            engine.noteOff();
          }
        }
      });

      // Create params with proper domain separation
      const paramsList = [];

      const preParam = createParam({
        id: 'pre',
        label: 'Pre',
        unit: 'dB',
        def01: 0.5,
        scale: Scale.db(-36, 6),
        format: Format.db,
      });
      paramsList.push(preParam);

      const cutoffParam = createParam({
        id: 'cutoff',
        label: 'Cutoff',
        unit: 'Hz',
        def01: Scale.log(30, 18000).to01(1200),
        scale: Scale.log(30, 18000),
        format: Format.hz,
      });
      paramsList.push(cutoffParam);

      const resoParam = createParam({
        id: 'reso',
        label: 'Reso',
        unit: 'Q',
        def01: 0.25,
        scale: Scale.linear(0.2, 18.2),
        format: Format.q,
      });
      paramsList.push(resoParam);

      const outParam = createParam({
        id: 'out',
        label: 'Out',
        unit: 'dB',
        def01: 0.8,
        scale: Scale.db(-36, 6),
        format: Format.db,
      });
      paramsList.push(outParam);

      // Wire params to engine (through Param layer, not directly)
      preParam.on(() => {
        if (engine) engine.setPreGain(preParam.getValue());
      });
      cutoffParam.on(() => {
        if (engine) engine.setCutoff(cutoffParam.getValue());
      });
      resoParam.on(() => {
        if (engine) engine.setResonance(resoParam.getValue());
      });
      outParam.on(() => {
        if (engine) engine.setOutGain(outParam.getValue());
      });

      // Synth Learn: ノブ/スライダークリックでCC Learn対象に
      function onGestureStart(param) {
        if (!synthLearnMode) return;
        synthLearnTarget = param.id;
        // ハイライト表示
        document.querySelectorAll('.synth-learning').forEach(el => el.classList.remove('synth-learning'));
        const ctrl = [kPre, kCut, kRes, sOut].find(c => {
          const p = paramsList.find(pp => pp.id === param.id);
          return p === param;
        });
      }

      // Synth MIDI handlers
      const synthLearnableKnobs = {};  // paramId -> { control, label }

      function handleSynthMidiNote(channel, note, velocity, isNoteOn) {
        if (synthLearnMode && synthLearnTarget === 'note') {
          // ノートチャンネルを学習
          midiNoteChannel = channel;
          const labelEl = keyboard.el.querySelector('.section-header') || keyboard.el;
          keyboard.el.classList.remove('synth-learning');
          keyboard.el.classList.add('mapped');
          synthLearnTarget = null;
          return;
        }
        // 通常のノート処理
        if (midiNoteChannel !== null && channel !== midiNoteChannel) return;
        if (isNoteOn && velocity > 0) {
          if (engine) engine.noteOn(engine.midiToFreq(note));
          keyboard.noteOn?.(note);
        } else {
          if (!keyHold && engine) engine.noteOff();
          keyboard.noteOff?.(note);
        }
      }

      function handleSynthMidiCC(channel, cc, value) {
        const key = `${channel}:${cc}`;
        if (synthLearnMode && synthLearnTarget && synthLearnTarget !== 'note') {
          // CCをパラメータにマッピング
          synthMidiMap.set(key, synthLearnTarget);
          // ラベル更新
          const entry = synthLearnableKnobs[synthLearnTarget];
          if (entry) {
            const labelEl = entry.control.el.querySelector('.label');
            if (labelEl) {
              const ccStr = String(cc).padStart(3, '0');
              labelEl.textContent = `${entry.label} [${ccStr}]`;
            }
            entry.control.el.classList.remove('synth-learning');
            entry.control.el.classList.add('mapped');
          }
          // 連続Learnのためtargetはクリアしない、ハイライトだけ解除
          synthLearnTarget = null;
          persistMidiBindings();
          return;
        }
        // 通常のCC適用
        const paramId = synthMidiMap.get(key);
        if (paramId) {
          const param = paramsList.find(p => p.id === paramId);
          if (param) param.set01(value / 127);
        }
      }

      window.handleSynthMidiNote = handleSynthMidiNote;
      window.handleSynthMidiCC = handleSynthMidiCC;

      const kPre = Knob({ label: 'Pre', param: preParam, onGestureStart });
      const kCut = Knob({ label: 'Cutoff', param: cutoffParam, onGestureStart });
      const kRes = Knob({ label: 'Reso', param: resoParam, onGestureStart });
      const sOut = Slider({ label: 'Out', param: outParam, onGestureStart, orientation: 'v', size: 'wide-short' });

      // Register knobs for Synth Learn
      synthLearnableKnobs['pre'] = { control: kPre, label: 'Pre' };
      synthLearnableKnobs['cutoff'] = { control: kCut, label: 'Cutoff' };
      synthLearnableKnobs['reso'] = { control: kRes, label: 'Reso' };
      synthLearnableKnobs['out'] = { control: sOut, label: 'Out' };

      // Click handler for Learn mode + double-click to clear
      const synthCtrlToParam = new Map([
        [kPre.el, 'pre'],
        [kCut.el, 'cutoff'],
        [kRes.el, 'reso'],
        [sOut.el, 'out']
      ]);
      [kPre, kCut, kRes, sOut].forEach(ctrl => {
        const paramId = synthCtrlToParam.get(ctrl.el);
        ctrl.el.addEventListener('click', () => {
          if (!synthLearnMode) return;
          document.querySelectorAll('.synth-learning').forEach(el => el.classList.remove('synth-learning'));
          ctrl.el.classList.add('synth-learning');
          synthLearnTarget = paramId;
        });
        ctrl.el.addEventListener('dblclick', (e) => {
          e.preventDefault();
          if (paramId) clearSynthMapping(paramId);
        });
      });

      // Keyboard click for Note Learn + double-click to clear
      keyboard.el.addEventListener('click', () => {
        if (!synthLearnMode) return;
        document.querySelectorAll('.synth-learning').forEach(el => el.classList.remove('synth-learning'));
        keyboard.el.classList.add('synth-learning');

          // 通常のCC適用

      let newPhase = 0;

      function animateNewComps() {
        newPhase += 0.03;
        seqFrameCount++;
        const l = 0.2 + 0.6 * Math.abs(Math.sin(newPhase));
        const r = 0.2 + 0.6 * Math.abs(Math.sin(newPhase + 0.5));

        // Peak Meters
        peakMeter1.setLevel(l);
        peakMeter2.setLevel(r);
        peakMeter3.setLevel(l);
        peakMeter4.setLevel(r);
        peakMeter5.setLevel((l + r) / 2);
        peakMeter6.setLevel((l + r) / 2);

        // Stereo Meters
        stereoMeter1.setLevel(l, r);
        stereoMeter2.setLevel(l, r);
        stereoMeter3.setLevel(l, r);

        // VU Meters
        vuH1.setLevel(l); vuH1.setPeak(l + 0.1);
        vuV1.setLevel(l); vuV1.setPeak(l + 0.1);
        vuStereo1.setLevel(l, r); vuStereo1.setPeak(l + 0.1, r + 0.1);

        // LED Bars
        ledBar1.setLevel(l);
        ledBar2.setLevel(r);

        // Phase Meter
        phaseMeter1.setCorrelation(Math.sin(newPhase * 0.5));

        // Fake waveform data
        const waveData = new Float32Array(128);
        for (let i = 0; i < 128; i++) {
          waveData[i] = Math.sin(i * 0.1 + newPhase * 2) * 0.8;
        }
        waveform1.draw(waveData);
        waveform2.draw(waveData);
        waveform3.draw(waveData);

        // Fake spectrum data
        const specData = new Uint8Array(64);
        for (let i = 0; i < 64; i++) {
          specData[i] = Math.max(0, 200 - i * 3 + Math.random() * 30);
        }
        spectrum1.draw(specData);
        spectrum2.draw(specData);
        spectrum3.draw(specData);

        // Scope data for Controls panel
        const scopeTimeData = new Uint8Array(2048);
        const scopeFreqData = new Uint8Array(1024);
        for (let i = 0; i < 2048; i++) {
          scopeTimeData[i] = 128 + Math.sin(i * 0.02 + newPhase * 3) * 60;
        }
        for (let i = 0; i < 1024; i++) {
          scopeFreqData[i] = Math.max(0, 220 - i * 0.3 + Math.random() * 20);
        }

        // Scope/Meter components (Controls panel)
        apScope1.draw((buf) => buf.set(scopeTimeData));
        apScope2.draw((buf) => buf.set(scopeTimeData));
        apScope3.draw((buf) => buf.set(scopeTimeData));
        apMeter1.set(r, r + 0.1);

        // Fake goniometer data
        const leftData = new Float32Array(128);
        const rightData = new Float32Array(128);
        for (let i = 0; i < 128; i++) {
          leftData[i] = Math.sin(i * 0.05 + newPhase) * 0.5;
          rightData[i] = Math.sin(i * 0.05 + newPhase + 0.3) * 0.5;
        }
        gonio1.draw(leftData, rightData);

        // Progress bars animation
        progress1.set(0.5 + 0.5 * Math.sin(newPhase * 0.5));
        progress2.set(0.3 + 0.4 * Math.sin(newPhase * 0.7 + 1));

        // Histogram animation
        const histData1 = [];
        const histData2 = [];
        for (let i = 0; i < 32; i++) {
          histData1.push(Math.abs(Math.sin(newPhase + i * 0.2)) * 0.8 + Math.random() * 0.2);
        }
        for (let i = 0; i < 16; i++) {
          histData2.push(Math.abs(Math.cos(newPhase * 0.5 + i * 0.3)) * 0.7 + Math.random() * 0.3);
        }
        histogram1.setData(histData1);
        histogram2.setData(histData2);

        // Filter graph animation (simulate filter sweep)
        const cutoff = 500 + 8000 * (0.5 + 0.5 * Math.sin(newPhase * 0.3));
        const q = 1 + 8 * (0.5 + 0.5 * Math.sin(newPhase * 0.2));
        filterGraph1.setFilter('lowpass', cutoff, q);
        filterGraph2.setFilter('bandpass', cutoff * 0.5, q * 0.5);

        // Step sequencer animation (約120BPM = 8フレームごと)
        if (seqFrameCount % 8 === 0) {
          seqStep = (seqStep + 1) % 16;
          stepSeq8.setCurrentStep(seqStep % 8);
          stepSeq16.setCurrentStep(seqStep);
        }

        requestAnimationFrame(animateNewComps);

      function attachMidi() {
        if (!midiAccess) return;
        // Detach all
        for (const i of midiAccess.inputs.values()) i.onmidimessage = null;

        // Attach selected input devices
        for (const id of selectedMidiInputs) {
          const input = [...midiAccess.inputs.values()].find((x) => x.id === id);
          if (!input) continue;

          input.onmidimessage = (ev) => {
            const data = ev.data;
            if (!data || data.length < 2) return;

            const status = data[0];
            const channel = status & 0x0F;
            const msgType = status & 0xF0;

            // Note On/Off処理
            if (msgType === 0x90 || msgType === 0x80) {
              const note = data[1];
              const velocity = data.length > 2 ? data[2] : 0;
              const isNoteOn = msgType === 0x90 && velocity > 0;
              if (window.handleSynthMidiNote) {
                window.handleSynthMidiNote(channel, note, velocity, isNoteOn);
              }
              return;
            }

            // CC処理
            const cc = parseMidiCC(ev);
            if (!cc) return;
            const k = keyForCC(cc.ch, cc.cc);
            const v01 = v01From7bit(cc.value);

            // Controls パネルの MIDI Learn 処理
            if (window.handleControlsMidiCC) {
              window.handleControlsMidiCC(cc.ch, cc.cc, cc.value);
            }

            // Synth Demo の MIDI CC 処理
            if (window.handleSynthMidiCC) {
              window.handleSynthMidiCC(cc.ch, cc.cc, cc.value);
            }

            // 旧Synth Demo MIDI Learn処理（後方互換）
            if (learn.enabled && learn.armedParam) {
              learn.map.set(k, learn.armedParam.id);
              renderMap();
              setLearnBadge('Mapped ' + k + ' to ' + learn.armedParam.label, true);
              learn.armedParam = null;
              return;
            }

            const pid = learn.map.get(k);
            if (!pid) return;
            const param = paramsList.find((x) => x.id === pid);
            if (param) param.set01(v01);
          };
        }
      }

      // Audio/MIDI onchange handlers are now in refreshAudioDevices/refreshMidiDevices

      let raf = 0;
      function startLoop() {
        cancelAnimationFrame(raf);
        const timeBuf = new Uint8Array(2048);
        const freqBuf = new Uint8Array(1024);

        const tick = async () => {
          try {
            raf = requestAnimationFrame(tick);
            const e = await engineP;

            // AudioContextが中断されていたら再開
            if (e.ctx.state === 'suspended' || e.ctx.state === 'interrupted') {
              try {
                await e.ctx.resume();
              } catch {}
            }

            e.analyser.getByteTimeDomainData(timeBuf);
          scope.draw((buf) => {
            buf.set(timeBuf);
          });

          e.analyser.getByteFrequencyData(freqBuf);
          spec.draw((buf) => {
            buf.set(freqBuf);
          });

          let peak = 0;
          let rms = 0;
          for (let i = 0; i < timeBuf.length; i++) {
            const v = (timeBuf[i] - 128) / 128;
            const av = Math.abs(v);
            if (av > peak) peak = av;
            rms += v * v;
          }
          rms = Math.sqrt(rms / timeBuf.length);
          meter.set(clamp01(rms * 1.6), clamp01(peak));
          } catch (err) {
            console.error('startLoop error:', err);
          }
        };
        tick();
      }

      return root;
    }

      const nodes = [

      ];

      let dragId = null;
      let dragOffX = 0;
      let dragOffY = 0;
      let connectFrom = null;
      let connectCursor = { x: 0, y: 0 };

      function serialize() {
        return { nodes, links };
      }

      function applyGraph(obj) {
        if (!obj || !Array.isArray(obj.nodes) || !Array.isArray(obj.links)) return false;
        nodes.length = 0;
        obj.nodes.forEach((n) => nodes.push(n));
        links = obj.links;
        render();
        return true;

      function render() {
        [...canvas.querySelectorAll('.node')].forEach((e) => e.remove());
        for (const n of nodes) canvas.append(renderNode(n));
        renderWires();
      }

      function renderNode(n) {
        const el = document.createElement('div');
        el.className = 'node';
        el.style.left = `${n.x}px`;
        el.style.top = `${n.y}px`;

        const head = document.createElement('div');
        head.className = 'nodeHeader';

        const title = document.createElement('div');
        title.className = 'nodeTitle';
        title.textContent = n.title;

        const type = document.createElement('div');
        type.className = 'badge';
        type.textContent = n.type;

        head.append(title, type);

        const ports = document.createElement('div');
        ports.className = 'nodePorts';

        const ins = document.createElement('div');
        ins.className = 'portCol';

        const outs = document.createElement('div');
        outs.className = 'portCol';

        if (n.type !== 'osc') ins.append(port(n.id, 'in', 'in'));
        if (n.type !== 'out') outs.append(port(n.id, 'out', 'out'));

        ports.append(ins, outs);
        el.append(head, ports);

        el.addEventListener('pointerdown', (e) => {
          if (e.target.classList?.contains('dot')) return;
          dragId = n.id;
          const r = el.getBoundingClientRect();
          const pr = canvas.getBoundingClientRect();
          dragOffX = e.clientX - r.left + pr.left;
          dragOffY = e.clientY - r.top + pr.top;
          el.setPointerCapture(e.pointerId);
        });

        el.addEventListener('pointermove', (e) => {
          if (!dragId || dragId !== n.id) return;
          const pr = canvas.getBoundingClientRect();
          n.x = e.clientX - pr.left - (dragOffX - pr.left);
          n.y = e.clientY - pr.top - (dragOffY - pr.top);
          el.style.left = `${n.x}px`;
          el.style.top = `${n.y}px`;
          renderWires();
        });

        el.addEventListener('pointerup', () => (dragId = null));
        el.addEventListener('pointercancel', () => (dragId = null));

        return el;
      }

      function port(nid, pid, dir) {
        const wrap = document.createElement('div');
        wrap.className = 'port';

        const dot = document.createElement('div');
        dot.className = `dot ${dir}`;
        dot.dataset.n = nid;
        dot.dataset.p = pid;
        dot.dataset.dir = dir;

        const name = document.createElement('div');
        name.textContent = pid;

        if (dir === 'in') wrap.append(dot, name);
        else wrap.append(name, dot);

        dot.addEventListener('click', () => {
          const d = dot.dataset.dir;
          const n = dot.dataset.n;
          const p = dot.dataset.p;

          if (d === 'out') {
            connectFrom = { n, p };
            [...canvas.querySelectorAll('.dot.out')].forEach((x) => x.classList.remove('armed'));
            dot.classList.add('armed');
            renderWires();
            return;
          }

          if (d === 'in' && connectFrom) {
            const exists = links.some((l) => l.from.n === connectFrom.n && l.to.n === n);
            if (!exists) links.push({ from: connectFrom, to: { n, p } });
            connectFrom = null;
            [...canvas.querySelectorAll('.dot.out')].forEach((x) => x.classList.remove('armed'));
            renderWires();
          }
        });

        return wrap;
      }

      function portPos(nid, dir) {
        const el = [...canvas.querySelectorAll('.dot')].find((d) => d.dataset.n === nid && d.dataset.dir === dir);
        if (!el) return null;
        const pr = canvas.getBoundingClientRect();
        const r = el.getBoundingClientRect();
        return { x: r.left - pr.left + r.width * 0.5, y: r.top - pr.top + r.height * 0.5 };
      }

      function renderWires() {
        const w = canvas.clientWidth;
        const hh = canvas.clientHeight;
        wires.setAttribute('viewBox', `0 0 ${w} ${hh}`);
        wires.setAttribute('width', String(w));
        wires.setAttribute('height', String(hh));
        while (wires.firstChild) wires.removeChild(wires.firstChild);

        function addWire(a, b, alpha, idx = null) {
          const path = document.createElementNS(wires.namespaceURI, 'path');
          const dx = Math.max(40, Math.abs(b.x - a.x) * 0.5);
          const d = `M ${a.x} ${a.y} C ${a.x + dx} ${a.y}, ${b.x - dx} ${b.y}, ${b.x} ${b.y}`;
          path.setAttribute('d', d);
          path.setAttribute('fill', 'none');
          path.setAttribute('stroke', `rgba(109,214,255,${alpha})`);
          path.setAttribute('stroke-width', '2');
          if (idx != null) {
            path.style.pointerEvents = 'auto';
            path.addEventListener('click', () => {
              links.splice(idx, 1);
              renderWires();
            });
          }
          wires.append(path);
        }

        for (let i = 0; i < links.length; i++) {
          const l = links[i];
          const a = portPos(l.from.n, 'out');
          const b = portPos(l.to.n, 'in');
          if (!a || !b) continue;
          addWire(a, b, 0.65, i);
        }

        if (connectFrom) {
          const a = portPos(connectFrom.n, 'out');
          const b = connectCursor;
          if (a) addWire(a, b, 0.35, null);
        }
      }

      canvas.addEventListener('pointermove', (e) => {
        const pr = canvas.getBoundingClientRect();
        connectCursor = { x: e.clientX - pr.left, y: e.clientY - pr.top };
        if (connectFrom) renderWires();
      });

      canvas.addEventListener('pointerdown', (e) => {
        if (!(e.target instanceof HTMLElement)) return;
        if (e.target.classList.contains('dot')) return;
        if (e.target.ownerSVGElement) return;
        connectFrom = null;
        [...canvas.querySelectorAll('.dot.out')].forEach((x) => x.classList.remove('armed'));
        renderWires();
      });

      // エンジンはユーザージェスチャー時に初期化（autoplay policy対応）
      let engineP = null;
      let engine = null;

      async function buildGraph() {
        // AudioContextはユーザージェスチャー内で作成する必要がある
        if (!engineP) {
          engineP = createEngine();
        }
        engine = await engineP;
        await engine.start();

        const ctx = engine.ctx;

        // For Node UI, we use native Web Audio nodes (not the worklet)
        // This demonstrates the separation between UI graph and audio graph
        if (engine.__nodeOsc) {
          try {
            engine.__nodeOsc.stop();
          } catch {}
        }
        for (const k of ['__nodeGain', '__nodeFilter', '__nodeOut']) {
          if (engine[k]) {
            try {
              engine[k].disconnect();
            } catch {}
            engine[k] = null;
          }
        }

        const osc = ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.value = 220;

        const g = ctx.createGain();
        g.gain.value = 0.3;

        const f = ctx.createBiquadFilter();
        f.type = 'lowpass';
        f.frequency.value = 1200;
        f.Q.value = 0.7;

        const out = ctx.createGain();
        out.gain.value = 0.9;

        engine.__nodeOsc = osc;
        engine.__nodeGain = g;
        engine.__nodeFilter = f;
        engine.__nodeOut = out;

        const byId = {};
        for (const n of nodes) {
          if (n.type === 'osc') byId[n.id] = osc;
          if (n.type === 'gain') byId[n.id] = g;
          if (n.type === 'filter') byId[n.id] = f;
          if (n.type === 'out') byId[n.id] = out;
        }

        try {
          osc.disconnect();
        } catch {}
        try {
          g.disconnect();
        } catch {}
        try {
          f.disconnect();
        } catch {}
        try {
          out.disconnect();
        } catch {}

        for (const l of links) {
          const a = byId[l.from.n];
          const b = byId[l.to.n];
          if (!a || !b) continue;
          a.connect(b);
        }

        out.connect(ctx.destination);
        osc.start();
        setStatus('Node audio running', true);
      }

        try {
          const obj = JSON.parse(graphText.value);
          if (!applyGraph(obj)) alert('invalid json');
        } catch {
          alert('invalid json');
        }
      };

      // Node UI params (using domain layer)
      const oscHzParam = createParam({
        id: 'osc_hz',
        label: 'Osc Hz',
        unit: 'Hz',
        def01: 0.35,
        scale: Scale.log(40, 2000),
        format: Format.hz,
      });

      const gainParam = createParam({
        id: 'gain',
        label: 'Gain',
        unit: 'dB',
        def01: 0.55,
        scale: Scale.db(-30, 6),
        format: Format.db,
      });

      const cutParam = createParam({
        id: 'cut',
        label: 'Cutoff',
        unit: 'Hz',
        def01: 0.45,
        scale: Scale.log(60, 18000),
        format: Format.hz,
      });

      oscHzParam.on(() => {
        if (engine && engine.__nodeOsc) {
          engine.__nodeOsc.frequency.setTargetAtTime(oscHzParam.getValue(), engine.ctx.currentTime, 0.01);
        }
      });

      gainParam.on(() => {
        if (engine && engine.__nodeGain) {
          engine.__nodeGain.gain.setTargetAtTime(gainParam.getValue(), engine.ctx.currentTime, 0.01);
        }
      });

      cutParam.on(() => {
        if (engine && engine.__nodeFilter) {
          engine.__nodeFilter.frequency.setTargetAtTime(cutParam.getValue(), engine.ctx.currentTime, 0.01);
        }
      });

      const kHz = Knob({ label: 'Osc Hz', param: oscHzParam });
      const kGain = Knob({ label: 'Gain', param: gainParam });
      const kCut = Knob({ label: 'Cutoff', param: cutParam });
      knobs.append(kHz.el, kGain.el, kCut.el);

      render();
      renderWires();

      return root;
    }

    /* ============================================
       Tab Navigation
       ============================================ */

    const pluginView = makePluginView();
    const nodeView = makeNodeView();

    function setTab(which) {
      $('#tabPlugin').setAttribute('aria-selected', String(which === 'plugin'));
      $('#tabNodes').setAttribute('aria-selected', String(which === 'nodes'));
      wrap.replaceChildren(which === 'plugin' ? pluginView : nodeView);
    }

    $('#tabPlugin').onclick = () => setTab('plugin');
    $('#tabNodes').onclick = () => setTab('nodes');
    setTab('plugin');

    /* ============================================
       Theme Switching
       ============================================ */
    const themeSel = $('#themeSel');
    const THEME_KEY = 'ui_theme';

    function applyTheme(themeClass) {
      // Remove all theme classes
      document.body.classList.remove(
        'theme-midnight', 'theme-charcoal', 'theme-forest', 'theme-slate',
        'theme-light', 'theme-sepia'
      );
      if (themeClass) {
        document.body.classList.add(themeClass);
      }
      localStorage.setItem(THEME_KEY, themeClass || '');
    }

    // Load saved theme
    const savedTheme = localStorage.getItem(THEME_KEY) || '';
    if (savedTheme) {
      themeSel.value = savedTheme;
      applyTheme(savedTheme);
    }

    themeSel.onchange = () => applyTheme(themeSel.value);
  </script>
</body>
</html>
