<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Audio UI Demo</title>
  <!-- External CSS (design system) -->
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/themes.css">
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div class="topbar">
    <div class="topbar-title">UMI</div>
    <div class="popover-wrap">
      <button id="deviceBtn" class="device-btn btn-led">
        <span class="led"></span>
        <span class="text">Audio/MIDI</span>
      </button>
      <div id="devicePopover" class="popover">
        <div class="popover-header">
          <span class="popover-title">Device Settings</span>
          <button class="popover-close" id="devicePopoverClose">✕</button>
        </div>
        <div class="popover-body">
          <div class="popover-section">
            <div class="popover-label">Audio Input</div>
            <select id="audioInputSel" class="select"></select>
          </div>
          <div class="popover-section">
            <div class="popover-label">Audio Output</div>
            <select id="audioOutputSel" class="select"></select>
          </div>
          <div class="popover-section">
            <div class="popover-label">MIDI Input</div>
            <div id="midiInputList" class="checkbox-list"></div>
          </div>
          <div class="popover-section">
            <div class="popover-label">MIDI Output</div>
            <div id="midiOutputList" class="checkbox-list"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="topbar-spacer"></div>
    <span id="status" class="badge">UI preview</span>
  </div>
  <div id="wrap" class="wrap"></div>
  <div class="footer">
    <div class="tabs">
      <button id="tabPlugin" class="tabbtn" aria-selected="true">Plugin UI</button>
      <button id="tabNodes" class="tabbtn" aria-selected="false">Node UI</button>
    </div>
    <select id="themeSel" class="theme-selector">
      <optgroup label="Dark - Sharp">
        <option value="">Midnight</option>
      </optgroup>
      <optgroup label="Dark - Rounded">
        <option value="theme-charcoal">Charcoal</option>
        <option value="theme-forest">Forest</option>
        <option value="theme-slate">Slate</option>
      </optgroup>
      <optgroup label="Light - Rounded">
        <option value="theme-light">Light</option>
        <option value="theme-sepia">Sepia</option>
      </optgroup>
    </select>
  </div>

  <script type="module">
    // Import from design system modules
    import { $, clamp01 } from './lib/utils.js';
    import { Scale, Format } from './domain/index.js';
    import { createParam } from './domain/param.js';
    import { createEngine } from './engine/engine.js';
    import {
      Knob, RotarySelector, Slider, TextInput, Button, Label, Value, Toggle,
      Dropdown, NumberInput, ProgressBar, Keyboard, Waveform, Spectrum,
      StereoMeter, RadioGroup, XYPad, Goniometer,
      Panel, Scope, Meter, Shell, PeakMeter, VUMeter, LEDBar, PhaseMeter,
      StepSequencer, Lamp, SegmentDisplay, SegmentedControl, WaveSelector,
      Encoder, MultiSelect, Histogram, FileDropZone, EnvelopeEditor, FilterGraph
    } from './ui_components/index.js';
    import {
      applyTheme, loadSavedTheme, initThemeSelector, initTabNavigation, setStatus,
      hr, requestMidiAccess, parseMidiCC, keyForCC, v01From7bit,
      loadMidiBindings, saveMidiBindings, loadPresets, savePresets
    } from './app/index.js';

    const wrap = $('#wrap');
    const statusEl = $('#status');

    // Status helper bound to statusEl
    const updateStatus = (text, ok) => setStatus(statusEl, text, ok);

    /* ============================================
       Plugin View
       ============================================ */

    function makePluginView() {
      const root = document.createElement('div');
      root.className = 'grid';

      let engineP = null;
      let engine = null;

      let midiAccess = null;
      let midiInput = null;

      const learn = { enabled: false, armedParam: null, map: new Map() };

      function renderMap() {}
      function renderPresets() {}

      function setLearnBadge(text, ok = null) {
        learnBadge.textContent = text;
        learnBadge.classList.toggle('ok', ok === true);
        learnBadge.classList.toggle('bad', ok === false);
      }

      const learnBadge = document.createElement('span');
      learnBadge.className = 'badge';
      learnBadge.textContent = 'MIDI Learn off';

      const deviceBtn = document.getElementById('deviceBtn');
      const devicePopover = document.getElementById('devicePopover');
      const devicePopoverClose = document.getElementById('devicePopoverClose');
      const audioInputSel = document.getElementById('audioInputSel');
      const audioOutputSel = document.getElementById('audioOutputSel');
      const midiInputList = document.getElementById('midiInputList');
      const midiOutputList = document.getElementById('midiOutputList');
      let isRunning = false;

      let selectedAudioInput = '';
      let selectedAudioOutput = '';
      let selectedMidiInputs = new Set();
      let selectedMidiOutputs = new Set();

      async function startEngine() {
        if (isRunning) return;
        try {
          if (!engineP) {
            engineP = createEngine({ workletPath: './engine/worklet/filter-processor.js' });
          }
          engine = await engineP;
          await engine.start();

          attachMidi();
          renderMap();
          renderPresets();

          for (const param of paramsList) {
            param.set01(param.get01());
          }

          startLoop();
          isRunning = true;
          deviceBtn.classList.add('active');
          updateStatus('Running', true);
        } catch (err) {
          updateStatus('Error: ' + err.message, false);
        }
      }

      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

      wrap.classList.add('disabled');

      if (isIOS) {
        deviceBtn.querySelector('.text').textContent = 'Start';
        deviceBtn.onclick = async () => {
          if (isRunning) return;
          await startEngine();
          wrap.classList.remove('disabled');
        };
      } else {
        deviceBtn.onclick = async () => {
          if (!isRunning) {
            await startEngine();
            wrap.classList.remove('disabled');
          }
          const wasOpen = devicePopover.classList.contains('open');
          devicePopover.classList.toggle('open');
          if (!wasOpen) {
            await refreshAudioDevices();
            await refreshMidiDevices();
          }
        };
        devicePopoverClose.onclick = () => devicePopover.classList.remove('open');
        document.addEventListener('click', (e) => {
          if (!deviceBtn.contains(e.target) && !devicePopover.contains(e.target)) {
            devicePopover.classList.remove('open');
          }
        });
      }

      // === Synth Demo Panel ===
      const paramsPanel = Panel({ title: 'Synth Demo' });

      let synthLearnMode = false;
      let synthLearnTarget = null;
      const synthMidiMap = new Map();
      let midiNoteChannel = null;

      function persistMidiBindings() {
        saveMidiBindings(synthMidiMap, midiLearnMap, midiNoteChannel);
      }

      function clearAllSynthMappings() {
        synthMidiMap.clear();
        midiNoteChannel = null;
        Object.values(synthLearnableKnobs).forEach(entry => {
          const labelEl = entry.control.el.querySelector('.label');
          if (labelEl) labelEl.textContent = entry.label;
          entry.control.el.classList.remove('mapped');
        });
        keyboard.el.classList.remove('mapped');
        persistMidiBindings();
      }

      function clearSynthMapping(paramId) {
        for (const [key, pid] of synthMidiMap.entries()) {
          if (pid === paramId) {
            synthMidiMap.delete(key);
            break;
          }
        }
        const entry = synthLearnableKnobs[paramId];
        if (entry) {
          const labelEl = entry.control.el.querySelector('.label');
          if (labelEl) labelEl.textContent = entry.label;
          entry.control.el.classList.remove('mapped');
        }
        persistMidiBindings();
      }

      const synthLearnBtn = document.createElement('button');
      synthLearnBtn.className = 'btn';
      synthLearnBtn.textContent = 'Learn';
      synthLearnBtn.onclick = () => {
        synthLearnMode = !synthLearnMode;
        if (synthLearnMode) {
          synthLearnBtn.textContent = 'Finish';
          synthLearnBtn.classList.add('active');
        } else {
          synthLearnBtn.textContent = 'Learn';
          synthLearnBtn.classList.remove('active');
          synthLearnTarget = null;
          document.querySelectorAll('.synth-learning').forEach(el => el.classList.remove('synth-learning'));
        }
      };

      const synthClearBtn = document.createElement('button');
      synthClearBtn.className = 'btn';
      synthClearBtn.textContent = 'Clear';
      synthClearBtn.onclick = () => clearAllSynthMappings();

      paramsPanel.header.querySelector('.panel-title')?.after((() => {
        const wrap = document.createElement('div');
        wrap.className = 'panel-actions';
        wrap.append(synthLearnBtn, synthClearBtn);
        return wrap;
      })());

      let keyHold = false;
      const keyHoldWrap = document.createElement('div');
      keyHoldWrap.className = 'ctrl';
      keyHoldWrap.style.gridColumn = 'span 4';
      keyHoldWrap.style.gridRow = 'span 2';
      keyHoldWrap.style.display = 'flex';
      keyHoldWrap.style.alignItems = 'center';
      keyHoldWrap.style.justifyContent = 'center';
      const keyHoldBtn = document.createElement('button');
      keyHoldBtn.className = 'btn';
      keyHoldBtn.textContent = 'Key Hold';
      keyHoldBtn.onclick = () => {
        keyHold = !keyHold;
        keyHoldBtn.classList.toggle('active', keyHold);
        if (!keyHold && engine) {
          engine.noteOff();
          keyboard.allNotesOff();
        }
      };
      keyHoldWrap.append(keyHoldBtn);

      const keyboard = Keyboard({
        size: '16x2',
        startNote: 48,
        onNoteOn: (note) => {
          if (engine) {
            engine.noteOn(engine.midiToFreq(note));
          }
        },
        onNoteOff: (note) => {
          if (!keyHold && engine) {
            engine.noteOff();
          }
        }
      });

      const paramsList = [];

      const preParam = createParam({
        id: 'pre',
        label: 'Pre',
        unit: 'dB',
        def01: 0.5,
        scale: Scale.db(-36, 6),
        format: Format.db,
      });
      paramsList.push(preParam);

      const cutoffParam = createParam({
        id: 'cutoff',
        label: 'Cutoff',
        unit: 'Hz',
        def01: Scale.log(30, 18000).to01(1200),
        scale: Scale.log(30, 18000),
        format: Format.hz,
      });
      paramsList.push(cutoffParam);

      const resoParam = createParam({
        id: 'reso',
        label: 'Reso',
        unit: 'Q',
        def01: 0.25,
        scale: Scale.linear(0.2, 18.2),
        format: Format.q,
      });
      paramsList.push(resoParam);

      const outParam = createParam({
        id: 'out',
        label: 'Out',
        unit: 'dB',
        def01: 0.8,
        scale: Scale.db(-36, 6),
        format: Format.db,
      });
      paramsList.push(outParam);

      preParam.on(() => {
        if (engine) engine.setPreGain(preParam.getValue());
      });
      cutoffParam.on(() => {
        if (engine) engine.setCutoff(cutoffParam.getValue());
      });
      resoParam.on(() => {
        if (engine) engine.setResonance(resoParam.getValue());
      });
      outParam.on(() => {
        if (engine) engine.setOutGain(outParam.getValue());
      });

      function onGestureStart(param) {
        if (!synthLearnMode) return;
        synthLearnTarget = param.id;
        document.querySelectorAll('.synth-learning').forEach(el => el.classList.remove('synth-learning'));
      }

      const synthLearnableKnobs = {};

      function handleSynthMidiNote(channel, note, velocity, isNoteOn) {
        if (synthLearnMode && synthLearnTarget === 'note') {
          midiNoteChannel = channel;
          keyboard.el.classList.remove('synth-learning');
          keyboard.el.classList.add('mapped');
          synthLearnTarget = null;
          return;
        }
        if (midiNoteChannel !== null && channel !== midiNoteChannel) return;
        if (isNoteOn && velocity > 0) {
          if (engine) engine.noteOn(engine.midiToFreq(note));
          keyboard.noteOn?.(note);
        } else {
          if (!keyHold && engine) engine.noteOff();
          keyboard.noteOff?.(note);
        }
      }

      function handleSynthMidiCC(channel, cc, value) {
        const key = `${channel}:${cc}`;
        if (synthLearnMode && synthLearnTarget && synthLearnTarget !== 'note') {
          synthMidiMap.set(key, synthLearnTarget);
          const entry = synthLearnableKnobs[synthLearnTarget];
          if (entry) {
            const labelEl = entry.control.el.querySelector('.label');
            if (labelEl) {
              const ccStr = String(cc).padStart(3, '0');
              labelEl.textContent = `${entry.label} [${ccStr}]`;
            }
            entry.control.el.classList.remove('synth-learning');
            entry.control.el.classList.add('mapped');
          }
          synthLearnTarget = null;
          persistMidiBindings();
          return;
        }
        const paramId = synthMidiMap.get(key);
        if (paramId) {
          const param = paramsList.find(p => p.id === paramId);
          if (param) param.set01(value / 127);
        }
      }

      window.handleSynthMidiNote = handleSynthMidiNote;
      window.handleSynthMidiCC = handleSynthMidiCC;

      const kPre = Knob({ label: 'Pre', param: preParam, onGestureStart });
      const kCut = Knob({ label: 'Cutoff', param: cutoffParam, onGestureStart });
      const kRes = Knob({ label: 'Reso', param: resoParam, onGestureStart });
      const sOut = Slider({ label: 'Out', param: outParam, onGestureStart, orientation: 'v', size: 'wide-short' });

      synthLearnableKnobs['pre'] = { control: kPre, label: 'Pre' };
      synthLearnableKnobs['cutoff'] = { control: kCut, label: 'Cutoff' };
      synthLearnableKnobs['reso'] = { control: kRes, label: 'Reso' };
      synthLearnableKnobs['out'] = { control: sOut, label: 'Out' };

      const synthCtrlToParam = new Map([
        [kPre.el, 'pre'],
        [kCut.el, 'cutoff'],
        [kRes.el, 'reso'],
        [sOut.el, 'out']
      ]);
      [kPre, kCut, kRes, sOut].forEach(ctrl => {
        const paramId = synthCtrlToParam.get(ctrl.el);
        ctrl.el.addEventListener('click', () => {
          if (!synthLearnMode) return;
          document.querySelectorAll('.synth-learning').forEach(el => el.classList.remove('synth-learning'));
          ctrl.el.classList.add('synth-learning');
          synthLearnTarget = paramId;
        });
        ctrl.el.addEventListener('dblclick', (e) => {
          e.preventDefault();
          if (paramId) clearSynthMapping(paramId);
        });
      });

      keyboard.el.addEventListener('click', () => {
        if (!synthLearnMode) return;
        document.querySelectorAll('.synth-learning').forEach(el => el.classList.remove('synth-learning'));
        keyboard.el.classList.add('synth-learning');
        synthLearnTarget = 'note';
      });
      keyboard.el.addEventListener('dblclick', (e) => {
        e.preventDefault();
        midiNoteChannel = null;
        keyboard.el.classList.remove('mapped');
      });

      paramsPanel.appendSection('Filter',
        kPre, kCut, kRes, sOut, keyHoldWrap
      );

      paramsPanel.appendSection('Keyboard', keyboard);

      // === Controls Panel with MIDI Learn ===
      const controlsPanel = Panel({ title: 'Controls' });

      let midiLearnMode = false;
      let midiLearnTarget = null;
      const midiLearnMap = new Map();
      const learnableControls = [];

      function clearAllControlsMappings() {
        midiLearnMap.clear();
        learnableControls.forEach(entry => {
          const labelEl = entry.el.querySelector('.label');
          if (labelEl) labelEl.textContent = entry.label;
          entry.el.classList.remove('mapped');
        });
        persistMidiBindings();
      }

      function clearControlsMapping(entry) {
        for (const [key, mapped] of midiLearnMap.entries()) {
          if (mapped === entry) {
            midiLearnMap.delete(key);
            break;
          }
        }
        const labelEl = entry.el.querySelector('.label');
        if (labelEl) labelEl.textContent = entry.label;
        entry.el.classList.remove('mapped');
        persistMidiBindings();
      }

      const learnBtn = document.createElement('button');
      learnBtn.className = 'btn';
      learnBtn.textContent = 'Learn';
      learnBtn.onclick = () => {
        midiLearnMode = !midiLearnMode;
        if (midiLearnMode) {
          learnBtn.textContent = 'Finish';
          learnBtn.classList.add('active');
          learnableControls.forEach(c => c.el.classList.add('learnable'));
        } else {
          learnBtn.textContent = 'Learn';
          learnBtn.classList.remove('active');
          learnableControls.forEach(c => c.el.classList.remove('learnable', 'learning'));
          midiLearnTarget = null;
        }
      };

      const clearBtn = document.createElement('button');
      clearBtn.className = 'btn';
      clearBtn.textContent = 'Clear';
      clearBtn.onclick = () => clearAllControlsMappings();

      controlsPanel.header.querySelector('.panel-title')?.after((() => {
        const wrap = document.createElement('div');
        wrap.className = 'panel-actions';
        wrap.append(learnBtn, clearBtn);
        return wrap;
      })());

      function registerLearnable(control, paramId, label) {
        const entry = { el: control.el, paramId, control, label };
        learnableControls.push(entry);
        control.el.addEventListener('click', (e) => {
          if (!midiLearnMode) return;
          e.stopPropagation();
          if (midiLearnTarget) {
            midiLearnTarget.el.classList.remove('learning');
          }
          midiLearnTarget = entry;
          control.el.classList.add('learning');
        });
        control.el.addEventListener('dblclick', (e) => {
          e.preventDefault();
          e.stopPropagation();
          clearControlsMapping(entry);
        });
      }

      function updateControlLabel(entry, ccNum) {
        const labelEl = entry.el.querySelector('.label');
        if (labelEl) {
          const ccStr = String(ccNum).padStart(3, '0');
          labelEl.textContent = `${entry.label} [${ccStr}]`;
        }
      }

      function handleControlsMidiCC(channel, cc, value) {
        const key = `${channel}:${cc}`;
        if (midiLearnMode && midiLearnTarget) {
          for (const [k, entry] of midiLearnMap.entries()) {
            if (k === key) {
              entry.el.classList.remove('mapped');
              const labelEl = entry.el.querySelector('.label');
              if (labelEl) labelEl.textContent = entry.label;
            }
          }
          midiLearnMap.set(key, midiLearnTarget);
          midiLearnTarget.el.classList.remove('learning');
          midiLearnTarget.el.classList.add('mapped');
          updateControlLabel(midiLearnTarget, cc);
          midiLearnTarget = null;
          persistMidiBindings();
        } else {
          const mapping = midiLearnMap.get(key);
          if (mapping && mapping.control.setNormalized) {
            mapping.control.setNormalized(value / 127);
          }
        }
      }

      window.handleControlsMidiCC = handleControlsMidiCC;

      const pC = createParam({ id: 'pC', label: 'Cut', unit: 'Hz', def01: 0.6, scale: Scale.log(30, 18000), format: Format.hz });
      const pD = createParam({ id: 'pD', label: 'Res', unit: '', def01: 0.4, scale: Scale.linear(0, 18), format: Format.q });
      const pA = createParam({ id: 'pA', label: 'Osc', unit: '', def01: 0.5, scale: Scale.linear(0, 100), format: (v) => v.toFixed(0) });
      const pB = createParam({ id: 'pB', label: 'Mod', unit: '', def01: 0.3, scale: Scale.linear(0, 100), format: (v) => v.toFixed(0) });
      const pVol = createParam({ id: 'pVol', label: 'Vol', unit: 'dB', def01: 0.8, scale: Scale.db(-60, 6), format: Format.db });
      const pPan = createParam({ id: 'pPan', label: 'Pan', unit: '', def01: 0.5, scale: Scale.linear(-50, 50), format: (v) => v.toFixed(0) });
      const pMix = createParam({ id: 'pMix', label: 'Mix', unit: '%', def01: 1.0, scale: Scale.linear(0, 100), format: (v) => v.toFixed(0) });
      const pA1 = createParam({ id: 'pA1', label: 'A', unit: '', def01: 0.1, scale: Scale.linear(0, 100), format: (v) => v.toFixed(0) });
      const pD1 = createParam({ id: 'pD1', label: 'D', unit: '', def01: 0.3, scale: Scale.linear(0, 100), format: (v) => v.toFixed(0) });
      const pS1 = createParam({ id: 'pS1', label: 'S', unit: '', def01: 0.7, scale: Scale.linear(0, 100), format: (v) => v.toFixed(0) });
      const pR1 = createParam({ id: 'pR1', label: 'R', unit: '', def01: 0.4, scale: Scale.linear(0, 100), format: (v) => v.toFixed(0) });
      const pX1 = createParam({ id: 'pX1', label: 'X', unit: '', def01: 0.5, scale: Scale.linear(0, 100), format: (v) => v.toFixed(0) });
      const pX2 = createParam({ id: 'pX2', label: 'Y', unit: '', def01: 0.6, scale: Scale.linear(0, 100), format: (v) => v.toFixed(0) });

      const ctrlSliderVol = Slider({ label: 'Vol', param: pVol, orientation: 'v', size: 'tall' });
      const ctrlSliderPan = Slider({ label: 'Pan', param: pPan, orientation: 'v', size: 'tall' });
      const ctrlKnobCut = Knob({ label: 'Cutoff', param: pC });
      const ctrlKnobRes = Knob({ label: 'Reso', param: pD });
      const ctrlSliderA = Slider({ label: 'A', param: pA1, orientation: 'v', size: 'thin-short' });
      const ctrlSliderD = Slider({ label: 'D', param: pD1, orientation: 'v', size: 'thin-short' });
      const ctrlSliderS = Slider({ label: 'S', param: pS1, orientation: 'v', size: 'thin-short' });
      const ctrlSliderR = Slider({ label: 'R', param: pR1, orientation: 'v', size: 'thin-short' });
      const ctrlKnobOsc = Knob({ label: 'Osc', param: pA });
      const ctrlKnobMod = Knob({ label: 'Mod', param: pB });
      const ctrlSliderLv1 = Slider({ label: 'Lv1', param: pMix, orientation: 'v', size: 'thin-tall' });
      const ctrlSliderLv2 = Slider({ label: 'Lv2', param: pB, orientation: 'v', size: 'thin-tall' });
      const ctrlSliderAux = Slider({ label: 'Aux', param: pX1, orientation: 'v', size: 'wide-short' });
      const ctrlSliderFx = Slider({ label: 'Fx', param: pX2, orientation: 'v', size: 'wide-short' });
      const ctrlSliderMix = Slider({ label: 'Mix', param: pMix, orientation: 'h', size: 'sm' });
      const ctrlSliderDry = Slider({ label: 'Dry', param: pB, orientation: 'h', size: 'sm' });
      const ctrlSliderMaster = Slider({ label: 'Master', param: pVol, orientation: 'h', size: 'md' });

      registerLearnable(ctrlSliderVol, 'pVol', 'Vol');
      registerLearnable(ctrlSliderPan, 'pPan', 'Pan');
      registerLearnable(ctrlKnobCut, 'pC', 'Cutoff');
      registerLearnable(ctrlKnobRes, 'pD', 'Reso');
      registerLearnable(ctrlSliderA, 'pA1', 'A');
      registerLearnable(ctrlSliderD, 'pD1', 'D');
      registerLearnable(ctrlSliderS, 'pS1', 'S');
      registerLearnable(ctrlSliderR, 'pR1', 'R');
      registerLearnable(ctrlKnobOsc, 'pA', 'Osc');
      registerLearnable(ctrlKnobMod, 'pB', 'Mod');
      registerLearnable(ctrlSliderLv1, 'pMix', 'Lv1');
      registerLearnable(ctrlSliderLv2, 'pB', 'Lv2');
      registerLearnable(ctrlSliderAux, 'pX1', 'Aux');
      registerLearnable(ctrlSliderFx, 'pX2', 'Fx');
      registerLearnable(ctrlSliderMix, 'pMix', 'Mix');
      registerLearnable(ctrlSliderDry, 'pB', 'Dry');
      registerLearnable(ctrlSliderMaster, 'pVol', 'Master');

      controlsPanel.appendSection('Knobs & Sliders',
        ctrlSliderVol, ctrlSliderPan,
        ctrlKnobCut, ctrlKnobRes,
        ctrlSliderA, ctrlSliderD, ctrlSliderS, ctrlSliderR,
        ctrlKnobOsc, ctrlKnobMod,
        ctrlSliderLv1, ctrlSliderLv2,
        ctrlSliderAux, ctrlSliderFx,
        ctrlSliderMix, ctrlSliderDry,
        ctrlSliderMaster
      );

      // === Audio Components Panel ===
      const audioPanel = Panel({ title: 'Audio Components', mode: 'expand' });

      const apGain = createParam({ id: 'apGain', label: 'Gain', unit: 'dB', def01: 0.5, scale: Scale.db(-24, 12), format: Format.db });

      let newPhase = 0;

      function animateNewComps() {
        newPhase += 0.03;
        seqFrameCount++;
        const l = 0.2 + 0.6 * Math.abs(Math.sin(newPhase));
        const r = 0.2 + 0.6 * Math.abs(Math.sin(newPhase + 0.5));

        peakMeter1.setLevel(l);
        peakMeter2.setLevel(r);
        peakMeter3.setLevel(l);
        peakMeter4.setLevel(r);
        peakMeter5.setLevel((l + r) / 2);
        peakMeter6.setLevel((l + r) / 2);

        stereoMeter1.setLevel(l, r);
        stereoMeter2.setLevel(l, r);
        stereoMeter3.setLevel(l, r);

        vuH1.setLevel(l); vuH1.setPeak(l + 0.1);
        vuV1.setLevel(l); vuV1.setPeak(l + 0.1);
        vuStereo1.setLevel(l, r); vuStereo1.setPeak(l + 0.1, r + 0.1);

        ledBar1.setLevel(l);
        ledBar2.setLevel(r);

        phaseMeter1.setCorrelation(Math.sin(newPhase * 0.5));

        const waveData = new Float32Array(128);
        for (let i = 0; i < 128; i++) {
          waveData[i] = Math.sin(i * 0.1 + newPhase * 2) * 0.8;
        }
        waveform1.draw(waveData);
        waveform2.draw(waveData);
        waveform3.draw(waveData);

        const specData = new Uint8Array(64);
        for (let i = 0; i < 64; i++) {
          specData[i] = Math.max(0, 200 - i * 3 + Math.random() * 30);
        }
        spectrum1.draw(specData);
        spectrum2.draw(specData);
        spectrum3.draw(specData);

        const scopeTimeData = new Uint8Array(2048);
        const scopeFreqData = new Uint8Array(1024);
        for (let i = 0; i < 2048; i++) {
          scopeTimeData[i] = 128 + Math.sin(i * 0.02 + newPhase * 3) * 60;
        }
        for (let i = 0; i < 1024; i++) {
          scopeFreqData[i] = Math.max(0, 220 - i * 0.3 + Math.random() * 20);
        }

        apScope1.draw((buf) => buf.set(scopeTimeData));
        apScope2.draw((buf) => buf.set(scopeTimeData));
        apScope3.draw((buf) => buf.set(scopeTimeData));
        apMeter1.set(r, r + 0.1);

        const leftData = new Float32Array(128);
        const rightData = new Float32Array(128);
        for (let i = 0; i < 128; i++) {
          leftData[i] = Math.sin(i * 0.05 + newPhase) * 0.5;
          rightData[i] = Math.sin(i * 0.05 + newPhase + 0.3) * 0.5;
        }
        gonio1.draw(leftData, rightData);

        progress1.set(0.5 + 0.5 * Math.sin(newPhase * 0.5));
        progress2.set(0.3 + 0.4 * Math.sin(newPhase * 0.7 + 1));

        const histData1 = [];
        const histData2 = [];
        for (let i = 0; i < 32; i++) {
          histData1.push(Math.abs(Math.sin(newPhase + i * 0.2)) * 0.8 + Math.random() * 0.2);
        }
        for (let i = 0; i < 16; i++) {
          histData2.push(Math.abs(Math.cos(newPhase * 0.5 + i * 0.3)) * 0.7 + Math.random() * 0.3);
        }
        histogram1.setData(histData1);
        histogram2.setData(histData2);

        const cutoff = 500 + 8000 * (0.5 + 0.5 * Math.sin(newPhase * 0.3));
        const q = 1 + 8 * (0.5 + 0.5 * Math.sin(newPhase * 0.2));
        filterGraph1.setFilter('lowpass', cutoff, q);
        filterGraph2.setFilter('bandpass', cutoff * 0.5, q * 0.5);

        if (seqFrameCount % 8 === 0) {
          seqStep = (seqStep + 1) % 16;
          stepSeq8.setCurrentStep(seqStep % 8);
          stepSeq16.setCurrentStep(seqStep);
        }

        requestAnimationFrame(animateNewComps);

          midiInputList.innerHTML = '<div class="small" style="color: var(--color-muted);">No devices</div>';
        } else {

          }
          for (const input of inputs) {

      function attachMidi() {
        if (!midiAccess) return;
        for (const i of midiAccess.inputs.values()) i.onmidimessage = null;

        for (const id of selectedMidiInputs) {
          const input = [...midiAccess.inputs.values()].find((x) => x.id === id);
          if (!input) continue;

          input.onmidimessage = (ev) => {
            const data = ev.data;
            if (!data || data.length < 2) return;

            const status = data[0];
            const channel = status & 0x0F;
            const msgType = status & 0xF0;

            if (msgType === 0x90 || msgType === 0x80) {
              const note = data[1];
              const velocity = data.length > 2 ? data[2] : 0;
              const isNoteOn = msgType === 0x90 && velocity > 0;
              if (window.handleSynthMidiNote) {
                window.handleSynthMidiNote(channel, note, velocity, isNoteOn);
              }
              return;
            }

            const cc = parseMidiCC(ev);
            if (!cc) return;
            const k = keyForCC(cc.ch, cc.cc);
            const v01 = v01From7bit(cc.value);

            if (window.handleControlsMidiCC) {
              window.handleControlsMidiCC(cc.ch, cc.cc, cc.value);
            }

            if (window.handleSynthMidiCC) {
              window.handleSynthMidiCC(cc.ch, cc.cc, cc.value);
            }

            if (learn.enabled && learn.armedParam) {
              learn.map.set(k, learn.armedParam.id);
              renderMap();
              setLearnBadge('Mapped ' + k + ' to ' + learn.armedParam.label, true);
              learn.armedParam = null;
              return;
            }

            const pid = learn.map.get(k);
            if (!pid) return;
            const param = paramsList.find((x) => x.id === pid);
            if (param) param.set01(v01);
          };
        }
      }

      let raf = 0;
      function startLoop() {
        cancelAnimationFrame(raf);
        const timeBuf = new Uint8Array(2048);
        const freqBuf = new Uint8Array(1024);

        const tick = async () => {
          try {
            raf = requestAnimationFrame(tick);
            const e = await engineP;

            if (e.ctx.state === 'suspended' || e.ctx.state === 'interrupted') {
              try {
                await e.ctx.resume();
              } catch {}
            }

            e.analyser.getByteTimeDomainData(timeBuf);
            scope.draw((buf) => {
              buf.set(timeBuf);
            });

            e.analyser.getByteFrequencyData(freqBuf);
            spec.draw((buf) => {
              buf.set(freqBuf);
            });

            let peak = 0;
            let rms = 0;
            for (let i = 0; i < timeBuf.length; i++) {
              const v = (timeBuf[i] - 128) / 128;
              const av = Math.abs(v);
              if (av > peak) peak = av;
              rms += v * v;
            }
            rms = Math.sqrt(rms / timeBuf.length);
            meter.set(clamp01(rms * 1.6), clamp01(peak));
          } catch (err) {
            console.error('startLoop error:', err);
          }
        };
        tick();
      }

      return root;
    }

    /* ============================================
       Node View
       ============================================ */

    function makeNodeView() {
      const root = document.createElement('div');
      root.className = 'nodeWrap';

      const panel = document.createElement('div');
      panel.className = 'nodePanel';

      const h = document.createElement('div');
      h.className = 'panel-header';
      h.innerHTML = '<div class="panel-title">Node graph</div>';

      const btnStart = document.createElement('button');
      btnStart.className = 'btn primary';
      btnStart.textContent = 'Start';

      const btnRebuild = document.createElement('button');
      btnRebuild.className = 'btn';
      btnRebuild.textContent = 'Rebuild';

      const btnClear = document.createElement('button');
      btnClear.className = 'btn warn';
      btnClear.textContent = 'Clear links';

      const info = document.createElement('div');
      info.className = 'small';
      info.textContent = '出力ドットをクリックし、入力ドットをクリックで接続。線をクリックで削除。';

      const knobs = document.createElement('div');
      knobs.className = 'kit';

      const ioRow = document.createElement('div');
      ioRow.className = 'row';
      ioRow.append(btnStart, btnRebuild, btnClear);

      const graphText = document.createElement('textarea');
      graphText.placeholder = 'graph json';

      const btnExport = document.createElement('button');
      btnExport.className = 'btn';
      btnExport.textContent = 'Export';

      const btnImport = document.createElement('button');
      btnImport.className = 'btn';
      btnImport.textContent = 'Import';

      const jsonRow = document.createElement('div');
      jsonRow.className = 'row';
      jsonRow.append(btnExport, btnImport);

      panel.append(h, ioRow, info, hr(), knobs, hr(), jsonRow, graphText);

      const canvas = document.createElement('div');
      canvas.className = 'nodeCanvas';

      const wires = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      wires.classList.add('wires');
      canvas.append(wires);

      root.append(panel, canvas);

      const nodes = [
        { id: 'n1', type: 'osc', x: 30, y: 40, title: 'Osc' },
        { id: 'n2', type: 'gain', x: 280, y: 70, title: 'Gain' },
        { id: 'n3', type: 'filter', x: 520, y: 50, title: 'Filter' },
        { id: 'n4', type: 'out', x: 760, y: 90, title: 'Out' },
      ];

      let links = [
        { from: { n: 'n1', p: 'out' }, to: { n: 'n2', p: 'in' } },
        { from: { n: 'n2', p: 'out' }, to: { n: 'n3', p: 'in' } },
        { from: { n: 'n3', p: 'out' }, to: { n: 'n4', p: 'in' } },
      ];

      let dragId = null;
      let dragOffX = 0;
      let dragOffY = 0;
      let connectFrom = null;
      let connectCursor = { x: 0, y: 0 };

      function serialize() {
        return { nodes, links };
      }

      function applyGraph(obj) {
        if (!obj || !Array.isArray(obj.nodes) || !Array.isArray(obj.links)) return false;
        nodes.length = 0;
        obj.nodes.forEach((n) => nodes.push(n));
        links = obj.links;
        render();
        return true;
      }

      function render() {
        [...canvas.querySelectorAll('.node')].forEach((e) => e.remove());
        for (const n of nodes) canvas.append(renderNode(n));
        renderWires();
      }

      function renderNode(n) {
        const el = document.createElement('div');
        el.className = 'node';
        el.style.left = `${n.x}px`;
        el.style.top = `${n.y}px`;

        const head = document.createElement('div');
        head.className = 'nodeHeader';

        const title = document.createElement('div');
        title.className = 'nodeTitle';
        title.textContent = n.title;

        const type = document.createElement('div');
        type.className = 'badge';
        type.textContent = n.type;

        head.append(title, type);

        const ports = document.createElement('div');
        ports.className = 'nodePorts';

        const ins = document.createElement('div');
        ins.className = 'portCol';

        const outs = document.createElement('div');
        outs.className = 'portCol';

        if (n.type !== 'osc') ins.append(port(n.id, 'in', 'in'));
        if (n.type !== 'out') outs.append(port(n.id, 'out', 'out'));

        ports.append(ins, outs);
        el.append(head, ports);

        el.addEventListener('pointerdown', (e) => {
          if (e.target.classList?.contains('dot')) return;
          dragId = n.id;
          const r = el.getBoundingClientRect();
          const pr = canvas.getBoundingClientRect();
          dragOffX = e.clientX - r.left + pr.left;
          dragOffY = e.clientY - r.top + pr.top;
          el.setPointerCapture(e.pointerId);
        });

        el.addEventListener('pointermove', (e) => {
          if (!dragId || dragId !== n.id) return;
          const pr = canvas.getBoundingClientRect();
          n.x = e.clientX - pr.left - (dragOffX - pr.left);
          n.y = e.clientY - pr.top - (dragOffY - pr.top);
          el.style.left = `${n.x}px`;
          el.style.top = `${n.y}px`;
          renderWires();
        });

        el.addEventListener('pointerup', () => (dragId = null));
        el.addEventListener('pointercancel', () => (dragId = null));

        return el;
      }

      function port(nid, pid, dir) {
        const wrap = document.createElement('div');
        wrap.className = 'port';

        const dot = document.createElement('div');
        dot.className = `dot ${dir}`;
        dot.dataset.n = nid;
        dot.dataset.p = pid;
        dot.dataset.dir = dir;

        const name = document.createElement('div');
        name.textContent = pid;

        if (dir === 'in') wrap.append(dot, name);
        else wrap.append(name, dot);

        dot.addEventListener('click', () => {
          const d = dot.dataset.dir;
          const n = dot.dataset.n;
          const p = dot.dataset.p;

          if (d === 'out') {
            connectFrom = { n, p };
            [...canvas.querySelectorAll('.dot.out')].forEach((x) => x.classList.remove('armed'));
            dot.classList.add('armed');
            renderWires();
            return;
          }

          if (d === 'in' && connectFrom) {
            const exists = links.some((l) => l.from.n === connectFrom.n && l.to.n === n);
            if (!exists) links.push({ from: connectFrom, to: { n, p } });
            connectFrom = null;
            [...canvas.querySelectorAll('.dot.out')].forEach((x) => x.classList.remove('armed'));
            renderWires();
          }
        });

        return wrap;
      }

      function portPos(nid, dir) {
        const el = [...canvas.querySelectorAll('.dot')].find((d) => d.dataset.n === nid && d.dataset.dir === dir);
        if (!el) return null;
        const pr = canvas.getBoundingClientRect();
        const r = el.getBoundingClientRect();
        return { x: r.left - pr.left + r.width * 0.5, y: r.top - pr.top + r.height * 0.5 };
      }

      function renderWires() {
        const w = canvas.clientWidth;
        const hh = canvas.clientHeight;
        wires.setAttribute('viewBox', `0 0 ${w} ${hh}`);
        wires.setAttribute('width', String(w));
        wires.setAttribute('height', String(hh));
        while (wires.firstChild) wires.removeChild(wires.firstChild);

        function addWire(a, b, alpha, idx = null) {
          const path = document.createElementNS(wires.namespaceURI, 'path');
          const dx = Math.max(40, Math.abs(b.x - a.x) * 0.5);
          const d = `M ${a.x} ${a.y} C ${a.x + dx} ${a.y}, ${b.x - dx} ${b.y}, ${b.x} ${b.y}`;
          path.setAttribute('d', d);
          path.setAttribute('fill', 'none');
          path.setAttribute('stroke', `rgba(109,214,255,${alpha})`);
          path.setAttribute('stroke-width', '2');
          if (idx != null) {
            path.style.pointerEvents = 'auto';
            path.addEventListener('click', () => {
              links.splice(idx, 1);
              renderWires();
            });
          }
          wires.append(path);
        }

        for (let i = 0; i < links.length; i++) {
          const l = links[i];
          const a = portPos(l.from.n, 'out');
          const b = portPos(l.to.n, 'in');
          if (!a || !b) continue;
          addWire(a, b, 0.65, i);
        }

        if (connectFrom) {
          const a = portPos(connectFrom.n, 'out');
          const b = connectCursor;
          if (a) addWire(a, b, 0.35, null);
        }
      }

      canvas.addEventListener('pointermove', (e) => {
        const pr = canvas.getBoundingClientRect();
        connectCursor = { x: e.clientX - pr.left, y: e.clientY - pr.top };
        if (connectFrom) renderWires();
      });

      canvas.addEventListener('pointerdown', (e) => {
        if (!(e.target instanceof HTMLElement)) return;
        if (e.target.classList.contains('dot')) return;
        if (e.target.ownerSVGElement) return;
        connectFrom = null;
        [...canvas.querySelectorAll('.dot.out')].forEach((x) => x.classList.remove('armed'));
        renderWires();
      });

      let engineP = null;
      let engine = null;

      async function buildGraph() {
        if (!engineP) {
          engineP = createEngine({ workletPath: './engine/worklet/filter-processor.js' });
        }
        engine = await engineP;
        await engine.start();

        const ctx = engine.ctx;

        if (engine.__nodeOsc) {
          try {
            engine.__nodeOsc.stop();
          } catch {}
        }
        for (const k of ['__nodeGain', '__nodeFilter', '__nodeOut']) {
          if (engine[k]) {
            try {
              engine[k].disconnect();
            } catch {}
            engine[k] = null;
          }
        }

        const osc = ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.value = 220;

        const g = ctx.createGain();
        g.gain.value = 0.3;

        const f = ctx.createBiquadFilter();
        f.type = 'lowpass';
        f.frequency.value = 1200;
        f.Q.value = 0.7;

        const out = ctx.createGain();
        out.gain.value = 0.9;

        engine.__nodeOsc = osc;
        engine.__nodeGain = g;
        engine.__nodeFilter = f;
        engine.__nodeOut = out;

        const byId = {};
        for (const n of nodes) {
          if (n.type === 'osc') byId[n.id] = osc;
          if (n.type === 'gain') byId[n.id] = g;
          if (n.type === 'filter') byId[n.id] = f;
          if (n.type === 'out') byId[n.id] = out;
        }

        try {
          osc.disconnect();
        } catch {}
        try {
          g.disconnect();
        } catch {}
        try {
          f.disconnect();
        } catch {}
        try {
          out.disconnect();
        } catch {}

        for (const l of links) {
          const a = byId[l.from.n];
          const b = byId[l.to.n];
          if (!a || !b) continue;
          a.connect(b);
        }

        out.connect(ctx.destination);
        osc.start();
        updateStatus('Node audio running', true);
      }

      btnStart.onclick = async () => {
        await buildGraph();
      };

      btnRebuild.onclick = async () => {
        await buildGraph();
      };

      btnClear.onclick = () => {
        links = [];
        renderWires();
      };

      btnExport.onclick = () => {
        graphText.value = JSON.stringify(serialize(), null, 2);
      };

      btnImport.onclick = () => {
        try {
          const obj = JSON.parse(graphText.value);
          if (!applyGraph(obj)) alert('invalid json');
        } catch {
          alert('invalid json');
        }
      };

      const oscHzParam = createParam({
        id: 'osc_hz',
        label: 'Osc Hz',
        unit: 'Hz',
        def01: 0.35,
        scale: Scale.log(40, 2000),
        format: Format.hz,
      });

      const gainParam = createParam({
        id: 'gain',
        label: 'Gain',
        unit: 'dB',
        def01: 0.55,
        scale: Scale.db(-30, 6),
        format: Format.db,
      });

      const cutParam = createParam({
        id: 'cut',
        label: 'Cutoff',
        unit: 'Hz',
        def01: 0.45,
        scale: Scale.log(60, 18000),
        format: Format.hz,
      });

      oscHzParam.on(() => {
        if (engine && engine.__nodeOsc) {
          engine.__nodeOsc.frequency.setTargetAtTime(oscHzParam.getValue(), engine.ctx.currentTime, 0.01);
        }
      });

      gainParam.on(() => {
        if (engine && engine.__nodeGain) {
          engine.__nodeGain.gain.setTargetAtTime(gainParam.getValue(), engine.ctx.currentTime, 0.01);
        }
      });

      cutParam.on(() => {
        if (engine && engine.__nodeFilter) {
          engine.__nodeFilter.frequency.setTargetAtTime(cutParam.getValue(), engine.ctx.currentTime, 0.01);
        }
      });

      const kHz = Knob({ label: 'Osc Hz', param: oscHzParam });
      const kGain = Knob({ label: 'Gain', param: gainParam });
      const kCut = Knob({ label: 'Cutoff', param: cutParam });
      knobs.append(kHz.el, kGain.el, kCut.el);

      render();
      renderWires();

      return root;
    }

    /* ============================================
       Initialization
       ============================================ */

    const pluginView = makePluginView();
    const nodeView = makeNodeView();

    initTabNavigation({
      tabPlugin: $('#tabPlugin'),
      tabNodes: $('#tabNodes'),
      wrap: wrap,
      pluginView: pluginView,
      nodeView: nodeView
    });

    initThemeSelector($('#themeSel'));
  </script>
</body>
