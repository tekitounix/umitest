<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>UMI-OS Synth Test</title>
  <style>
    body { font-family: sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
    button { background: #e94560; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 4px; }
    button:hover { filter: brightness(1.1); }
    .key { display: inline-block; width: 40px; height: 100px; background: white; border: 1px solid #333; margin: 2px; cursor: pointer; }
    .key.black { width: 25px; height: 60px; background: #333; margin-left: -15px; margin-right: -15px; position: relative; z-index: 1; }
    .key:active, .key.active { background: #e94560; }
    #log { background: #0a0a15; padding: 10px; border-radius: 4px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <h1>UMI-OS Synth Test</h1>
  <button id="start">Start Audio</button>
  <div id="status">Status: Not started</div>

  <h2>Keyboard</h2>
  <div id="keyboard"></div>

  <h2>Log</h2>
  <div id="log"></div>

  <script>
    let audioContext = null;
    let synthNode = null;

    function log(msg) {
      const logEl = document.getElementById('log');
      logEl.innerHTML += `[${new Date().toISOString().substr(11, 8)}] ${msg}<br>`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = 'Status: ' + msg;
    }

    // Create keyboard
    const keyboard = document.getElementById('keyboard');
    const notes = [
      {note: 60, black: false}, {note: 61, black: true},
      {note: 62, black: false}, {note: 63, black: true},
      {note: 64, black: false}, {note: 65, black: false},
      {note: 66, black: true}, {note: 67, black: false},
      {note: 68, black: true}, {note: 69, black: false},
      {note: 70, black: true}, {note: 71, black: false},
      {note: 72, black: false}
    ];

    notes.forEach(({note, black}) => {
      const key = document.createElement('div');
      key.className = `key ${black ? 'black' : ''}`;
      key.dataset.note = note;
      key.addEventListener('mousedown', () => noteOn(note));
      key.addEventListener('mouseup', () => noteOff(note));
      key.addEventListener('mouseleave', (e) => { if (e.buttons > 0) noteOff(note); });
      keyboard.appendChild(key);
    });

    function noteOn(note) {
      if (!synthNode) return;
      synthNode.port.postMessage({ type: 'note-on', note, velocity: 100 });
      document.querySelector(`.key[data-note="${note}"]`)?.classList.add('active');
      log(`Note ON: ${note}`);
    }

    function noteOff(note) {
      if (!synthNode) return;
      synthNode.port.postMessage({ type: 'note-off', note });
      document.querySelector(`.key[data-note="${note}"]`)?.classList.remove('active');
      log(`Note OFF: ${note}`);
    }

    document.getElementById('start').addEventListener('click', async () => {
      try {
        setStatus('Loading WASM...');
        // Fetch WASM binary (UMI-OS kernel simulation)
        const wasmResponse = await fetch('../synth/synth_sim.wasm');
        if (!wasmResponse.ok) {
          throw new Error('Failed to fetch WASM: ' + wasmResponse.status);
        }
        const wasmBytes = await wasmResponse.arrayBuffer();
        log(`WASM loaded (${wasmBytes.byteLength} bytes)`);

        setStatus('Creating AudioContext...');
        audioContext = new AudioContext({ sampleRate: 48000 });
        log(`AudioContext created (${audioContext.sampleRate}Hz)`);

        setStatus('Loading worklet module...');
        // Use synth_worklet.js which receives WASM via postMessage
        await audioContext.audioWorklet.addModule('./synth_worklet.js');
        log('Worklet module loaded (UMI-OS Kernel Simulation)');

        setStatus('Creating AudioWorkletNode...');
        synthNode = new AudioWorkletNode(audioContext, 'synth-worklet-processor', {
          processorOptions: { sampleRate: audioContext.sampleRate }
        });
        log('AudioWorkletNode created');

        // Wait for ready message
        setStatus('Initializing WASM...');
        await new Promise((resolve, reject) => {
          const timeout = setTimeout(() => reject(new Error('Timeout')), 10000);
          synthNode.port.onmessage = (e) => {
            log(`Message from worklet: ${e.data.type}`);
            if (e.data.type === 'ready') {
              clearTimeout(timeout);
              resolve();
            } else if (e.data.type === 'error') {
              clearTimeout(timeout);
              reject(new Error(e.data.message));
            }
          };
          // Send WASM bytes to worklet
          synthNode.port.postMessage({ type: 'init', wasmBytes });
        });

        // Connect to output
        synthNode.connect(audioContext.destination);
        log('Connected to destination');

        setStatus('Ready! Click keyboard to play');

      } catch (err) {
        log(`ERROR: ${err.message}`);
        setStatus(`Error: ${err.message}`);
        console.error(err);
      }
    });
  </script>
</body>
</html>
